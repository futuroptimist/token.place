name: Validate relay container image

on:
  pull_request:
    paths:
      - Dockerfile
      - docker/relay/**
      - relay.py
      - config/**
      - api/**
      - utils/**
      - static/**
      - config/requirements_relay.txt
      - .github/workflows/build.yml
  push:
    branches:
      - main
      - codex/**
    paths:
      - Dockerfile
      - docker/relay/**
      - relay.py
      - config/**
      - api/**
      - utils/**
      - static/**
      - config/requirements_relay.txt
      - .github/workflows/build.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/tokenplace-relay

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      # Canonical publishing moved to ci-image.yml so this sentinel workflow is validation-only.
      PUSH_IMAGE: false
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
          flavor: |
            latest=false
          labels: |
            org.opencontainers.image.title=tokenplace-relay
            org.opencontainers.image.description=token.place relay service
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/docs/relay-deploy.md
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created={{ timestamp }}
            org.opencontainers.image.licenses=MIT

      - name: Build multi-arch image without publishing
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ env.PUSH_IMAGE == 'true' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: "mode=max"
          sbom: true

      - name: Validation summary
        run: |
          {
            echo "## Relay image validation"
            echo ""
            echo "Built image: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}`"
            echo "Pushed: false"
            echo ""
            echo "Canonical GHCR publishing is handled by `.github/workflows/ci-image.yml`."
          } >> "$GITHUB_STEP_SUMMARY"
