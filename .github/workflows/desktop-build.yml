name: Build Desktop App

on:
  push:
    branches: [ main, master ]
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing desktop-v* tag to publish assets for
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            build_script: package:win
            artifact_name: token-place-desktop-win
            required_artifact_glob: desktop/dist/**/*.exe
          - os: macos-latest
            build_script: package:mac
            artifact_name: token-place-desktop-mac
            required_artifact_glob: desktop/dist/**/*.dmg
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build sources
        run: npm run build
      - name: Package application
        run: npm run ${{ matrix.build_script }}
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.required_artifact_glob }}
          if-no-files-found: error

  publish-release:
    name: Publish Desktop Release Assets
    needs: build
    if: startsWith(github.ref, 'refs/tags/desktop-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/desktop-v* ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.tag_name }}" ]]; then
            echo "value=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "No desktop-v* tag available for release publishing" >&2
            exit 1
          fi

      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: token-place-desktop-win
          path: release-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v5
        with:
          name: token-place-desktop-mac
          path: release-assets/macos

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a7e09a9927dc4bc7a32c
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          name: ${{ steps.release_tag.outputs.value }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/windows/**/*.exe
            release-assets/macos/**/*.dmg
