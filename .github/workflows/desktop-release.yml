name: Desktop Tauri Release

on:
  push:
    tags:
      - 'desktop-v*'
  pull_request:
    paths:
      - '.github/workflows/desktop-release.yml'
      - 'desktop-tauri/**'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Existing desktop-v* tag to rebuild/re-publish (required unless dry_run=true)'
        required: false
        type: string
      dry_run:
        description: 'Build only (skip GitHub Release create/update and upload)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build desktop artifacts (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: macos-arm64-bundles
            tauri_target: aarch64-apple-darwin
            checksum_file: SHA256SUMS-macos-arm64.txt
          - os: windows-latest
            artifact_name: windows-x64-bundles
            tauri_target: ''
            checksum_file: SHA256SUMS-windows-x64.txt
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name != '' && inputs.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop-tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: desktop-tauri/src-tauri -> target

      - name: Add macOS arm64 Rust target
        if: matrix.tauri_target != ''
        run: rustup target add ${{ matrix.tauri_target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        # Keep this explicit pre-build. Some CI failures reported frontendDist validation
        # before Tauri's internal beforeBuildCommand hook on clean runners.
        run: npm run build

      - name: Compile desktop Rust crate
        shell: bash
        run: |
          if [ -n "${{ matrix.tauri_target }}" ]; then
            cargo check --release --manifest-path src-tauri/Cargo.toml --target ${{ matrix.tauri_target }}
          else
            cargo check --release --manifest-path src-tauri/Cargo.toml
          fi

      - name: Build Tauri bundles
        shell: bash
        run: |
          if [ -n "${{ matrix.tauri_target }}" ]; then
            npm run tauri build -- --target ${{ matrix.tauri_target }}
          else
            npm run tauri build
          fi

      - name: Stage bundle artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          if [ "${{ runner.os }}" = "macOS" ]; then
            dmg_dir="src-tauri/target/${{ matrix.tauri_target }}/release/bundle/dmg"
            dmg_files=("${dmg_dir}"/*.dmg)
            if [ ! -e "${dmg_files[0]}" ]; then
              echo "No DMG found in ${dmg_dir}" >&2
              exit 1
            fi
            cp "${dmg_files[@]}" release-artifacts/
          elif [ "${{ runner.os }}" = "Windows" ]; then
            nsis_dir="src-tauri/target/release/bundle/nsis"
            msi_dir="src-tauri/target/release/bundle/msi"

            setup_files=("${nsis_dir}"/*-setup.exe)
            if [ ! -e "${setup_files[0]}" ]; then
              echo "No setup EXE found in ${nsis_dir}" >&2
              exit 1
            fi
            cp "${setup_files[@]}" release-artifacts/

            msi_files=("${msi_dir}"/*.msi)
            if [ ! -e "${msi_files[0]}" ]; then
              echo "No MSI found in ${msi_dir}" >&2
              exit 1
            fi
            cp "${msi_files[@]}" release-artifacts/
          else
            echo "Unsupported runner.os: ${{ runner.os }}" >&2
            exit 1
          fi

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          from pathlib import Path

          artifact_root = Path('release-artifacts')
          files = sorted(
              p for p in artifact_root.iterdir()
              if p.is_file() and p.name != '${{ matrix.checksum_file }}'
          )
          if not files:
              raise SystemExit('No staged bundle artifacts found in release-artifacts')

          checksums = artifact_root / '${{ matrix.checksum_file }}'
          with checksums.open('w', encoding='utf-8') as fh:
              for path in files:
                  digest = hashlib.sha256(path.read_bytes()).hexdigest()
                  fh.write(f"{digest}  {path.name}\n")
          PY

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: desktop-tauri/release-artifacts/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' && (github.event_name == 'push' || !inputs.dry_run) }}
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag_name }}" ]; then
            case "${{ inputs.tag_name }}" in
              desktop-v*) ;;
              *)
                echo "workflow_dispatch input 'tag_name' must match desktop-v*" >&2
                exit 1
                ;;
            esac
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "workflow_dispatch requires inputs.tag_name unless inputs.dry_run=true" >&2
            exit 1
          fi

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-bundles
          path: release-assets/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-bundles
          path: release-assets/windows

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a7e09a9927dc4bc7a32c # v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/macos/*
            release-assets/windows/*
