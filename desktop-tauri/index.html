<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>token.place desktop (MVP)</title>
    <script type="module" src="/src/main.ts"></script>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; background: #111827; color: #f3f4f6; }
      main { max-width: 900px; margin: 0 auto; padding: 24px; }
      .panel { background: #1f2937; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
      label { display: block; margin-bottom: 6px; font-size: 14px; }
      input, textarea, select, button { width: 100%; box-sizing: border-box; margin-bottom: 8px; padding: 8px; border-radius: 8px; border: 1px solid #374151; background: #0f172a; color: #f3f4f6; }
      button { cursor: pointer; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      pre { white-space: pre-wrap; background: #030712; border-radius: 8px; min-height: 180px; padding: 12px; }
      .muted { color: #9ca3af; font-size: 13px; }
    </style>
  </head>
  <body><main id="app"></main></body>
</html>
