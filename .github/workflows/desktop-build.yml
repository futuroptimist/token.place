name: Build Desktop App

on:
  push:
    branches: [ main, master ]
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional desktop-v* tag to publish artifacts to'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            build_script: package:win
            artifact_name: token-place-desktop-win
            required_artifact_glob: desktop/dist/**/*.exe
          - os: macos-latest
            build_script: package:mac
            artifact_name: token-place-desktop-mac
            required_artifact_glob: desktop/dist/**/*.dmg
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build sources
        run: npm run build
      - name: Package application
        run: npm run ${{ matrix.build_script }}
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.required_artifact_glob }}
          if-no-files-found: error

  publish-release:
    name: Publish Desktop Release Assets
    needs: build
    if: startsWith(github.ref, 'refs/tags/desktop-v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag_name="${INPUT_RELEASE_TAG}"

            if [ "${GITHUB_REF_TYPE}" != "tag" ] || [ "${GITHUB_REF_NAME}" != "${tag_name}" ]; then
              echo "workflow_dispatch runs must be started from the same desktop-v* tag as release_tag." >&2
              exit 1
            fi
          else
            tag_name="${GITHUB_REF_NAME}"
          fi

          case "$tag_name" in
            desktop-v*) ;;
            *)
              echo "release_tag must start with desktop-v" >&2
              exit 1
              ;;
          esac

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: token-place-desktop-win
          path: release-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v5
        with:
          name: token-place-desktop-mac
          path: release-assets/macos

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a7e09a9927dc4bc7a32c
        with:
          tag_name: ${{ steps.release_tag.outputs.tag_name }}
          name: ${{ steps.release_tag.outputs.tag_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/windows/**/*.exe
            release-assets/macos/**/*.dmg
