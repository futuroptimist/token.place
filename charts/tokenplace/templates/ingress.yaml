{{- if .Values.ingress.enabled }}
{{- if eq (len .Values.ingress.hosts) 0 }}
{{- fail "ingress.enabled=true requires ingress.hosts with at least one host entry" }}
{{- end }}
{{- if eq (len .Values.ingress.tls) 0 }}
{{- fail "ingress.enabled=true requires ingress.tls with at least one TLS secret/host mapping" }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "tokenplace.fullname" . }}
  labels:
    {{- include "tokenplace.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ required "ingress.hosts[].host is required" .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "tokenplace.fullname" $ }}
                port:
                  name: http
          {{- end }}
    {{- end }}
  tls:
    {{- range .Values.ingress.tls }}
    - secretName: {{ required "ingress.tls[].secretName is required when ingress is enabled" .secretName }}
      hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
    {{- end }}
{{- end }}
