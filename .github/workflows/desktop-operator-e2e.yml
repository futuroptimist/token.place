name: Desktop operator app e2e

# Cargo occasionally fails on GitHub-hosted runners with curl HTTP/2
# framing errors while downloading crates during Tauri builds. Disable HTTP
# multiplexing for this workflow and allow extra retries so transient registry
# transport failures do not fail the desktop operator e2e job.
env:
  CARGO_HTTP_MULTIPLEXING: 'false'
  CARGO_NET_RETRY: '10'

on:
  pull_request:
    paths:
      - '.github/workflows/desktop-operator-e2e.yml'
      - 'desktop-tauri/src/**'
      - 'desktop-tauri/src-tauri/src/**'
      - 'desktop-tauri/src-tauri/python/**'
      - 'desktop-tauri/src-tauri/tauri.conf.json'
      - 'desktop-tauri/scripts/test_packaged_operator_e2e.py'
      - 'desktop-tauri/scripts/test_desktop_operator_ui_e2e.py'
      - 'desktop-tauri/scripts/test_desktop_no_relay_autostart_e2e.py'
      - 'desktop-tauri/scripts/test_desktop_relay_operator_parity_e2e.py'
      - 'desktop-tauri/scripts/run_desktop_parity_checks.py'
      - 'tests/unit/test_model_manager.py'
      - 'tests/integration/test_desktop_qwen64k_packaged_runtime.py'
      - 'utils/**'
      - 'config.py'
      - 'encrypt.py'
      - 'relay.py'
      - 'api/v1/**'
      - 'requirements.txt'
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/desktop-operator-e2e.yml'
      - 'desktop-tauri/src/**'
      - 'desktop-tauri/src-tauri/src/**'
      - 'desktop-tauri/src-tauri/python/**'
      - 'desktop-tauri/src-tauri/tauri.conf.json'
      - 'desktop-tauri/scripts/test_packaged_operator_e2e.py'
      - 'desktop-tauri/scripts/test_desktop_operator_ui_e2e.py'
      - 'desktop-tauri/scripts/test_desktop_no_relay_autostart_e2e.py'
      - 'desktop-tauri/scripts/test_desktop_relay_operator_parity_e2e.py'
      - 'desktop-tauri/scripts/run_desktop_parity_checks.py'
      - 'tests/unit/test_model_manager.py'
      - 'tests/integration/test_desktop_qwen64k_packaged_runtime.py'
      - 'utils/**'
      - 'config.py'
      - 'encrypt.py'
      - 'relay.py'
      - 'api/v1/**'
      - 'requirements.txt'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  desktop-operator-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            webkit2gtk-driver \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            xvfb

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: desktop-tauri/package-lock.json

      - name: Install desktop Node dependencies
        working-directory: desktop-tauri
        run: npm ci

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run targeted Rust regressions
        run: |
          cargo test --manifest-path desktop-tauri/src-tauri/Cargo.toml operator_logs
          cargo test --manifest-path desktop-tauri/src-tauri/Cargo.toml compute_node

      - name: Install tauri-driver
        run: cargo install tauri-driver

      - name: Build desktop frontend assets
        working-directory: desktop-tauri
        run: npm run build

      - name: Build desktop binary (debug, no bundle)
        working-directory: desktop-tauri
        run: npm run tauri build -- --debug --no-bundle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: config/requirements_codex_verification.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r config/requirements_codex_verification.txt
          pip install selenium

      - name: Run full Rust suite
        run: cargo test --manifest-path desktop-tauri/src-tauri/Cargo.toml

      - name: Run desktop operator UI e2e
        run: xvfb-run -a python desktop-tauri/scripts/test_desktop_operator_ui_e2e.py

      - name: Run packaged operator bridge e2e
        run: python desktop-tauri/scripts/test_packaged_operator_e2e.py

      - name: Run shared desktop parity checks without duplicate packaged e2e
        run: python desktop-tauri/scripts/run_desktop_parity_checks.py --skip-packaged

      - name: Run packaged cancellation and integration regressions
        run: python -m pytest tests/integration/test_desktop_qwen64k_packaged_runtime.py -q

      - name: Upload desktop e2e logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-operator-e2e-logs
          path: .desktop-e2e-logs/
          include-hidden-files: true
          if-no-files-found: warn

  desktop-operator-packaged-e2e-windows:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r config/requirements_codex_verification.txt

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run shared desktop parity checks (Windows)
        run: python desktop-tauri/scripts/run_desktop_parity_checks.py

      - name: Run Windows CUDA capability handoff regressions (fakes)
        run: |
          python -m pytest tests/unit/test_desktop_runtime_setup.py -q
          python -m pytest tests/unit/test_model_manager.py -q
          python -m pytest tests/integration/test_desktop_qwen64k_packaged_runtime.py -q
          cargo test --manifest-path desktop-tauri/src-tauri/Cargo.toml

      - name: Run Windows packaged-start preflight with poisoned host Python state
        shell: pwsh
        env:
          PATH: ${{ github.workspace }}\.host-tool-sentinels
          PYTHONHOME: C:\host-poison\pythonhome
          PYTHONPATH: C:\host-poison\pythonpath
          PYTHONUSERBASE: C:\host-poison\userbase
          VIRTUAL_ENV: C:\host-poison\venv
          CONDA_PREFIX: C:\host-poison\conda
          PIP_INDEX_URL: https://example.invalid/simple
          PIP_REQUIRE_VIRTUALENV: '1'
          CMAKE_ARGS: -DGGML_CUDA=off
          FORCE_CMAKE: '1'
          TOKEN_PLACE_PYTHON_IMPORT_ROOT: C:\host-poison\import-root
          TOKEN_PLACE_SIDECAR_PYTHON: ${{ github.workspace }}\.host-tool-sentinels\python.exe
          TOKEN_PLACE_DESKTOP_PYTHON: ${{ github.workspace }}\.host-tool-sentinels\python.exe
        run: |
          New-Item -ItemType Directory -Force .host-tool-sentinels | Out-Null
          cargo test --manifest-path desktop-tauri/src-tauri/Cargo.toml bundled_metadata_probe_is_sanitized_before_execution
          cargo test --manifest-path desktop-tauri/src-tauri/Cargo.toml no_child_startup_failure_completes_reservation_and_allows_next_start

      - name: Upload desktop relay parity logs on failure (Windows)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-relay-operator-parity-logs-windows
          path: .desktop-e2e-logs/
          include-hidden-files: true
          if-no-files-found: warn


  desktop-operator-packaged-inspect-python39-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python dependencies (Linux, Python 3.9 inspect)
        run: |
          python -m pip install --upgrade pip
          pip install -r config/requirements_codex_verification.txt

      - name: Run dependency-isolated model bridge inspect smoke (Linux, Python 3.9)
        env:
          TOKEN_PLACE_INSPECT_ONLY: "1"
        run: python desktop-tauri/scripts/test_packaged_operator_e2e.py
