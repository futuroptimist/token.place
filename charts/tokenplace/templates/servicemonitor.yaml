{{- if .Values.serviceMonitor.enabled }}
{{- if not .Values.metrics.enabled }}{{ fail "metrics.enabled=true is required when serviceMonitor.enabled=true" }}{{- end }}
{{- $metricsSecret := required "metrics.auth.existingSecret is required when serviceMonitor.enabled=true" .Values.metrics.auth.existingSecret }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "tokenplace.fullname" . }}
  labels:
    {{- include "tokenplace.labels" . | nindent 4 }}
    {{- $reservedLabels := list "helm.sh/chart" "app.kubernetes.io/name" "app.kubernetes.io/instance" "app.kubernetes.io/version" "app.kubernetes.io/managed-by" }}
    {{- range $key, $_ := .Values.serviceMonitor.additionalLabels }}
    {{- if has $key $reservedLabels }}{{ fail (printf "serviceMonitor.additionalLabels must not override chart label %q" $key) }}{{- end }}
    {{- end }}
    {{- with .Values.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "tokenplace.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: "/metrics"
      interval: {{ .Values.serviceMonitor.interval | quote }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout | quote }}
      authorization:
        type: Bearer
        credentials:
          name: {{ $metricsSecret | quote }}
          key: {{ .Values.metrics.auth.secretKey | quote }}
      {{- $metricLabels := .Values.serviceMonitor.metricLabels | default dict }}
      {{- if or $metricLabels.app $metricLabels.environment $metricLabels.release $metricLabels.cluster }}
      relabelings:
        {{- with $metricLabels.app }}
        - action: replace
          targetLabel: app
          replacement: {{ . | quote }}
        {{- end }}
        {{- with $metricLabels.environment }}
        - action: replace
          targetLabel: environment
          replacement: {{ . | quote }}
        {{- end }}
        {{- with $metricLabels.release }}
        - action: replace
          targetLabel: release
          replacement: {{ . | quote }}
        {{- end }}
        {{- with $metricLabels.cluster }}
        - action: replace
          targetLabel: cluster
          replacement: {{ . | quote }}
        {{- end }}
      {{- end }}
{{- end }}
