name: Desktop Tauri Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Immutable desktop-v* tag to build/publish (required unless dry_run=true)'
        required: false
        type: string
      dry_run:
        description: 'Build only (skip GitHub Release create/update and upload)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  # Tag pushes and non-dry manual retries for the same tag intentionally share
  # a release group; dry-run validations stay isolated from publishing runs.
  group: desktop-release-${{ inputs.dry_run && 'dry-run' || 'release' }}-${{ inputs.tag_name || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build desktop artifacts (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            artifact_name: macos-arm64-bundles
            tauri_target: aarch64-apple-darwin
            checksum_file: SHA256SUMS-macos-arm64.txt
          - os: windows-latest
            artifact_name: windows-x64-bundles
            tauri_target: x86_64-pc-windows-msvc
            checksum_file: SHA256SUMS-windows-x64.txt
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name != '' && inputs.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop-tauri/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: desktop-tauri/src-tauri -> target
          # Do not restore ~/.cargo/bin from cache. Restoring toolchain shims can
          # shadow the Cargo installed by dtolnay/rust-toolchain and make Tauri's
          # `cargo metadata` probe execute the rustup installer instead of Cargo.
          cache-bin: 'false'

      - name: Validate Cargo toolchain
        shell: bash
        run: |
          set -euo pipefail
          cargo_path="$(command -v cargo)"
          rustup_path="$(command -v rustup)"
          echo "cargo=${cargo_path}"
          echo "rustup=${rustup_path}"
          cargo_version="$(cargo --version 2>&1)"
          echo "${cargo_version}"
          if [[ "${cargo_version}" != cargo\ * ]]; then
            echo "::error::cargo resolved to ${cargo_path}, but it did not report a Cargo version."
            exit 1
          fi
          rustc --version
          rustup show active-toolchain
          cargo metadata --manifest-path src-tauri/Cargo.toml --format-version=1 --no-deps >/dev/null

      - name: Add macOS arm64 Rust target
        if: matrix.tauri_target != ''
        run: rustup target add ${{ matrix.tauri_target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Install desktop llama-cpp runtime with platform GPU backend
        # The release matrix currently builds macOS and Windows artifacts only.
        # macOS prepares and validates its bundled interpreter in the dedicated
        # embedded-runtime step below; Windows intentionally keeps its existing
        # packaging path. Keep this Linux-only guard so future Linux desktop
        # packaging can reuse the shared setup without making macOS release
        # builds compile/install llama-cpp into the runner Python.
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python - <<'PY'
          import os
          import pathlib
          import subprocess
          import sys

          repo_root = pathlib.Path.cwd().parent
          desktop_python_root = repo_root / "desktop-tauri" / "src-tauri" / "python"
          sys.path.insert(0, str(desktop_python_root))

          from desktop_gpu_packaging import (
              backend_probe_satisfies_install_plan,
              llama_cpp_install_plan_fallbacks,
          )
          from desktop_runtime_setup import _probe_llama_runtime

          plans = llama_cpp_install_plan_fallbacks(platform=sys.platform, requirements_path=repo_root / "requirements.txt")

          def _is_bad_zip_error(output: str) -> bool:
              lower = output.lower()
              return "bad crc-32" in lower or "badzipfile" in lower

          def _supports_expected_backend(plan) -> bool:
              if plan.backend not in {"cuda", "metal"}:
                  return True
              probe = _probe_llama_runtime(runtime_root=repo_root)
              if backend_probe_satisfies_install_plan(plan, probe):
                  return True
              print("Backend validation probe details:")
              print(f"  probe.backend={probe.backend}")
              print(f"  probe.gpu_offload_supported={probe.gpu_offload_supported}")
              print(f"  probe.detected_device={probe.detected_device}")
              print(f"  probe.llama_module_path={probe.llama_module_path}")
              print(f"  probe.error={probe.error}")
              print(f"  sys.executable={sys.executable}")
              return False

          def _can_attempt_cuda_build() -> bool:
              if sys.platform.lower().startswith("win"):
                  return bool(os.environ.get("CUDA_PATH")) or pathlib.Path(
                      "C:/Program Files/NVIDIA GPU Computing Toolkit/CUDA"
                  ).exists()
              return True

          for plan_index, plan in enumerate(plans, start=1):
              if plan.backend == "cuda" and not _can_attempt_cuda_build():
                  print("Skipping CUDA source-build plan: CUDA toolkit not detected on this runner.")
                  continue

              install_args = plan.pip_install_args()
              command = [sys.executable, "-m", "pip", "install", *install_args, plan.package_spec]
              env = os.environ.copy()
              env.update(plan.pip_env())

              print(f"Installing {plan.package_spec} for backend={plan.backend} on platform={sys.platform}")
              print(f"Install plan {plan_index}/{len(plans)}")
              if plan.index_url:
                  print(f"Using pip index-url: {plan.index_url}")
              if plan.pip_env():
                  print(f"Using build env: {plan.pip_env()}")

              max_attempts = 3
              for attempt in range(1, max_attempts + 1):
                  result = subprocess.run(
                      command,
                      env=env,
                      check=False,
                      capture_output=True,
                      text=True,
                  )
                  if result.returncode == 0:
                      if _supports_expected_backend(plan):
                          raise SystemExit(0)
                      print(
                          f"Install succeeded but backend probe did not confirm expected "
                          f"GPU backend={plan.backend}; trying next fallback plan."
                      )
                      break

                  combined_output = f"{result.stdout}\n{result.stderr}"
                  print(combined_output)

                  if _is_bad_zip_error(combined_output):
                      print("Detected corrupted wheel archive (BadZip/CRC); switching to next fallback plan.")
                      break

                  if attempt >= max_attempts:
                      print(f"Install attempt {attempt} failed for plan {plan_index}.")
                  else:
                      print(f"Install attempt {attempt} failed, retrying...")

              print(f"Falling back from plan {plan_index} to next candidate...")
              subprocess.run(
                  [sys.executable, "-m", "pip", "uninstall", "-y", "llama-cpp-python"],
                  check=False,
              )

          raise RuntimeError("Failed to install llama-cpp-python for all configured plans")
          PY


      - name: Cache embedded macOS Python archive and wheels
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/token-place/embedded-python
          key: embedded-python-${{ runner.os }}-${{ hashFiles('desktop-tauri/src-tauri/python/embedded_python_runtime_manifest.json', 'desktop-tauri/src-tauri/python/requirements_desktop_runtime.txt') }}

      - name: Cache embedded Windows CUDA Python runtime artifacts
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            desktop-tauri/.cache/windows-python-runtime
          key: windows-cuda-python-runtime-${{ runner.os }}-${{ hashFiles('desktop-tauri/src-tauri/python/embedded_python_runtime_windows_x86_64_manifest.json') }}

      - name: Prepare embedded macOS Python runtime
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          test "$(uname -m)" = "arm64"
          python scripts/prepare_embedded_python_runtime.py
          test -x src-tauri/python-runtime/bin/python3
          src-tauri/python-runtime/bin/python3 -m pip check

      - name: Prepare embedded Windows CUDA Python runtime
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/prepare_windows_embedded_python_runtime.py
          test -f src-tauri/python-runtime/python.exe
          src-tauri/python-runtime/python.exe -m pip check

      - name: Build frontend assets
        # Keep this explicit pre-build. Some CI failures reported frontendDist validation
        # before Tauri's internal beforeBuildCommand hook on clean runners.
        run: npm run build

      - name: Build Tauri bundles
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            CONFIGURED_APPLE_SIGNING_IDENTITY="${{ secrets.APPLE_SIGNING_IDENTITY }}"
            APPLE_CERTIFICATE_P12_BASE64="${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}"
            APPLE_CERTIFICATE_PASSWORD="${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
            APPLE_KEYCHAIN_PASSWORD="${{ secrets.APPLE_KEYCHAIN_PASSWORD }}"
            # Prevent tauri-bundler from auto-reading an empty APPLE_SIGNING_IDENTITY
            # from the job environment, which triggers a failing `codesign -s ""` path.
            unset APPLE_SIGNING_IDENTITY
            if [ -n "${CONFIGURED_APPLE_SIGNING_IDENTITY:-}" ] && [ -n "${APPLE_CERTIFICATE_P12_BASE64:-}" ] && [ -n "${APPLE_CERTIFICATE_PASSWORD:-}" ]; then
              KEYCHAIN_PATH="$RUNNER_TEMP/codesign.keychain-db"
              KEYCHAIN_PASSWORD="${APPLE_KEYCHAIN_PASSWORD:-temp_keychain_password}"
              CERT_PATH="$RUNNER_TEMP/apple-signing-cert.p12"
              echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
              security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
              security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
              security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
              security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
              security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
              security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
              export TAURI_BUNDLE_MACOS_SIGNING_IDENTITY="$CONFIGURED_APPLE_SIGNING_IDENTITY"
              export APPLE_SIGNING_IDENTITY="$CONFIGURED_APPLE_SIGNING_IDENTITY"
              export APPLE_CERTIFICATE_IMPORTED=1
            else
              echo "::warning::Developer ID certificate and identity are not fully configured; using ad-hoc signing for preview/dev-only macOS artifacts."
              export TAURI_BUNDLE_MACOS_SIGNING_IDENTITY='-'
              export APPLE_SIGNING_IDENTITY='-'
            fi
          fi
          if [ "${{ runner.os }}" = "macOS" ] && [ -n "${{ matrix.tauri_target }}" ]; then
            # Tauri's built-in DMG bundler is flaky for cross-target macOS builds in CI
            # (bundle_dmg.sh intermittently exits non-zero). Build the .app reliably, then
            # generate the DMG in the staging step via hdiutil.
            npm run tauri build -- --target ${{ matrix.tauri_target }} --bundles app
          elif [ -n "${{ matrix.tauri_target }}" ]; then
            npm run tauri build -- --target ${{ matrix.tauri_target }}
          else
            npm run tauri build
          fi

      - name: Stage bundle artifacts
        shell: bash
        env:
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          if [ "${{ runner.os }}" = "macOS" ]; then
            bundle_root="src-tauri/target/${{ matrix.tauri_target }}/release/bundle"
            app_dir="${bundle_root}/macos"
            app_files=("${app_dir}"/*.app)
            if [ ! -e "${app_files[0]}" ]; then
              echo "No .app bundle found in ${app_dir}" >&2
              exit 1
            fi

            app_path="${app_files[0]}"
            app_name="$(basename "${app_path}" .app)"
            if [[ "${app_name}" == *"tokenplace Desktop"* ]]; then
              echo "stale Electron branding detected in app name: ${app_name}" >&2
              exit 1
            fi
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${INPUT_TAG_NAME:-}" ]; then
              case "${INPUT_TAG_NAME}" in
                desktop-v*) ;;
                *)
                  echo "workflow_dispatch input 'tag_name' must match desktop-v*" >&2
                  exit 1
                  ;;
              esac
              ref_slug="${INPUT_TAG_NAME}"
            else
              ref_slug="${GITHUB_REF_NAME:-manual}"
            fi
            ref_slug="${ref_slug//\//-}"
            version="${ref_slug#desktop-v}"
            dmg_name="token.place-desktop-${version}-apple-silicon.dmg"
            dmg_path="release-artifacts/${dmg_name}"
            dmg_stage_dir="$RUNNER_TEMP/token-place-dmg-stage"
            preview_notice_name="README BEFORE OPENING.txt"
            preview_notice="release-artifacts/README-macos-apple-silicon-preview.txt"

            if [ -n "${APPLE_SIGNING_IDENTITY:-}" ] && [ -n "${APPLE_CERTIFICATE_P12_BASE64:-}" ] && [ -n "${APPLE_CERTIFICATE_PASSWORD:-}" ]; then
              printf '%s\n' \
                "token.place desktop macOS Apple Silicon preview build" \
                "" \
                "This preview build is signed with the configured Apple signing identity, but it is not notarized." \
                "Unpaid/no-credential preview builds use ad-hoc signing; either way, this workflow does not perform Developer ID notarization." \
                "The first normal double-click may show:" \
                "\"Apple could not verify \\\"token.place desktop\\\" is free of malware.\"" \
                "This is expected for unpaid/non-notarized GitHub preview releases." \
                "" \
                "If you trust this source and the release checksums:" \
                "1) Drag/copy token.place desktop.app to Applications." \
                "2) Try opening it once from Applications." \
                "3) If macOS blocks it, click Done." \
                "4) Open System Settings -> Privacy & Security." \
                "5) Click Open Anyway / Allow / Open for token.place desktop." \
                "6) Or Control-click (right-click) the app and choose Open when available." \
                "" \
                "Only install if you trust this GitHub release and verify checksums." \
                "" \
                "Normal no-warning public macOS distribution requires paid Developer ID signing + notarization." > "${preview_notice}"
            else
              printf '%s\n' \
                "token.place desktop macOS Apple Silicon preview build" \
                "" \
                "This preview build is ad-hoc signed and not notarized." \
                "The first normal double-click may show:" \
                "\"Apple could not verify \\\"token.place desktop\\\" is free of malware.\"" \
                "" \
                "This is expected for unpaid/non-notarized GitHub preview releases." \
                "" \
                "If you trust this source and the release checksums:" \
                "1) Drag/copy token.place desktop.app to Applications." \
                "2) Try opening it once from Applications." \
                "3) If macOS blocks it, click Done." \
                "4) Open System Settings -> Privacy & Security." \
                "5) Click Open Anyway / Allow / Open for token.place desktop." \
                "6) Or Control-click (right-click) the app and choose Open when available." \
                "" \
                "Only install if you trust this GitHub release and verify checksums." \
                "" \
                "Normal no-warning public macOS distribution requires paid Developer ID signing + notarization." > "${preview_notice}"
            fi
            codesign --verify --deep --strict --verbose=4 "${app_path}"

            signing_flag=""
            if [ -n "${APPLE_SIGNING_IDENTITY:-}" ] && [ -n "${APPLE_CERTIFICATE_P12_BASE64:-}" ] && [ -n "${APPLE_CERTIFICATE_PASSWORD:-}" ]; then
              signing_flag="--expect-signing"
            fi
            python ../scripts/validate_desktop_tauri_release_artifacts.py               --app-only               --require-embedded-python-runtime               --app-path "${app_path}"               --tauri-config src-tauri/tauri.conf.json               --expected-icon src-tauri/icons/icon.icns               ${signing_flag}
            codesign --verify --deep --strict --verbose=4 "${app_path}"

            rm -rf "${dmg_stage_dir}"
            mkdir -p "${dmg_stage_dir}"
            cp -R "${app_path}" "${dmg_stage_dir}/"
            staged_app_path="${dmg_stage_dir}/$(basename "${app_path}")"
            codesign --verify --deep --strict --verbose=4 "${staged_app_path}"
            cp "${preview_notice}" "${dmg_stage_dir}/${preview_notice_name}"
            ln -s /Applications "${dmg_stage_dir}/Applications"
            rm -f "${dmg_path}"
            hdiutil create -volname "token.place desktop" -srcfolder "${dmg_stage_dir}" -ov -format UDZO "${dmg_path}"
            if [[ "${dmg_path}" == *"tokenplace Desktop"* ]] || [[ "${dmg_path}" == *"tokenplace Desktop Setup"* ]] || [[ "${dmg_path}" == *"desktop/electron-builder"* ]]; then
              echo "stale Electron branding detected in staged DMG path: ${dmg_path}" >&2
              exit 1
            fi
          elif [ "${{ runner.os }}" = "Windows" ]; then
            nsis_dir="src-tauri/target/${{ matrix.tauri_target }}/release/bundle/nsis"
            msi_dir="src-tauri/target/${{ matrix.tauri_target }}/release/bundle/msi"

            setup_files=("${nsis_dir}"/*-setup.exe)
            if [ ! -e "${setup_files[0]}" ]; then
              echo "No setup EXE found in ${nsis_dir}" >&2
              exit 1
            fi
            cp "${setup_files[@]}" release-artifacts/

            msi_files=("${msi_dir}"/*.msi)
            if [ ! -e "${msi_files[0]}" ]; then
              echo "No MSI found in ${msi_dir}" >&2
              exit 1
            fi
            cp "${msi_files[@]}" release-artifacts/
          else
            echo "Unsupported runner.os: ${{ runner.os }}" >&2
            exit 1
          fi

      - name: Install macOS validation test dependencies
        if: runner.os == 'macOS'
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'pytest>=8.1'

      - name: Validate macOS staged artifact guardrails
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_NOTARYTOOL_KEYCHAIN_PROFILE: ${{ secrets.APPLE_NOTARYTOOL_KEYCHAIN_PROFILE }}
        run: |
          set -euo pipefail
          app_path="$(find src-tauri/target/${{ matrix.tauri_target }}/release/bundle/macos -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "${app_path}" ]; then
            echo "Expected macOS .app in bundle output." >&2
            exit 1
          fi
          dmg_count="$(find release-artifacts -maxdepth 1 -type f -name '*.dmg' | wc -l | tr -d '[:space:]')"
          if [ "${dmg_count}" -ne 1 ]; then
            echo "Expected exactly one staged macOS .dmg in release-artifacts; found ${dmg_count}." >&2
            exit 1
          fi
          dmg_path="$(find release-artifacts -maxdepth 1 -type f -name '*.dmg' | sort | head -n 1)"
          if [ -z "${dmg_path}" ]; then
            echo "Expected staged macOS .dmg in release-artifacts." >&2
            exit 1
          fi
          if [ ! -f release-artifacts/README-macos-apple-silicon-preview.txt ]; then
            echo "Expected release-artifacts/README-macos-apple-silicon-preview.txt for macOS preview guidance." >&2
            exit 1
          fi

          signing_flag=""
          if [ -n "${APPLE_SIGNING_IDENTITY:-}" ] && [ -n "${APPLE_CERTIFICATE_P12_BASE64:-}" ] && [ -n "${APPLE_CERTIFICATE_PASSWORD:-}" ]; then
            signing_flag="--expect-signing"
            if [ -n "${APPLE_NOTARYTOOL_KEYCHAIN_PROFILE:-}" ]; then
              echo "::warning::APPLE_NOTARYTOOL_KEYCHAIN_PROFILE is set, but notarization/stapling is not performed in this workflow yet; skipping strict Gatekeeper notarization enforcement."
            fi
          fi

          python ../scripts/validate_desktop_tauri_release_artifacts.py               --require-embedded-python-runtime               --app-path "${app_path}"               --dmg-path "${dmg_path}"               --tauri-config src-tauri/tauri.conf.json               --expected-icon src-tauri/icons/icon.icns               ${signing_flag}

          cd ..
          python -m pytest --confcutdir=tests/integration tests/integration/test_macos_release_probe.py -q

      - name: Validate Windows MSI and NSIS artifact contents
        if: runner.os == 'Windows'
        shell: bash
        env:
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -t nsis_paths < <(find release-artifacts -maxdepth 1 -type f -name '*-setup.exe' | sort)
          mapfile -t msi_paths < <(find release-artifacts -maxdepth 1 -type f -name '*.msi' | sort)
          if [ "${#nsis_paths[@]}" -ne 1 ] || [ "${#msi_paths[@]}" -ne 1 ]; then
            echo "Expected exactly one staged Windows NSIS and one MSI artifact before validation." >&2
            printf 'NSIS count=%s MSI count=%s\n' "${#nsis_paths[@]}" "${#msi_paths[@]}" >&2
            exit 1
          fi
          nsis_path="${nsis_paths[0]}"
          msi_path="${msi_paths[0]}"
          validator_version_args=()
          tag_name="${INPUT_TAG_NAME:-}"
          if [ -z "${tag_name}" ] && [ "${GITHUB_REF:-}" != "${GITHUB_REF#refs/tags/}" ]; then
            tag_name="${GITHUB_REF#refs/tags/}"
          fi
          if [ -n "${tag_name}" ]; then
            if [[ "${tag_name}" =~ ^desktop-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              validator_version_args=(--release-tag "${tag_name}")
            elif [ "${GITHUB_REF:-}" != "${GITHUB_REF#refs/tags/}" ] || [ -n "${INPUT_TAG_NAME:-}" ]; then
              echo "Unexpected desktop release tag '${tag_name}'; expected desktop-vX.Y.Z." >&2
              exit 1
            fi
          fi
          python ../scripts/validate_windows_desktop_release_artifacts.py \
            --windows-nsis "${nsis_path}" \
            --windows-msi "${msi_path}" \
            "${validator_version_args[@]}"
          current_version="${tag_name#desktop-v}"
          if [ -z "${tag_name}" ]; then
            current_version="$(python -c 'import json; print(json.load(open("package.json"))["version"])')"
          fi
          release_source_repo="${GITHUB_REPOSITORY}"
          if [ "${GITHUB_EVENT_NAME:-}" = "pull_request" ]; then
            release_source_repo="${{ github.event.pull_request.base.repo.full_name }}"
          fi
          releases_json="${RUNNER_TEMP}/token-place-desktop-releases.json"
          gh release list --repo "${release_source_repo}" --limit 200 --json tagName,isDraft,isPrerelease > "${releases_json}"
          previous_tag="$(python - "${current_version}" "${release_source_repo}" "${releases_json}" <<'PY'
          import json
          import re
          import sys

          current_version, release_source_repo, releases_path = sys.argv[1:]
          semver = re.compile(r"^desktop-v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$")

          def parse_version(value: str) -> tuple[int, int, int]:
              match = re.fullmatch(r"(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)", value)
              if not match:
                  raise SystemExit(f"current desktop version {value!r} is not semantic X.Y.Z")
              return tuple(int(part) for part in match.groups())

          current = parse_version(current_version)
          candidates = []
          releases = json.loads(open(releases_path, encoding="utf-8").read())
          if isinstance(releases, dict):
              releases = [releases]
          for release in releases:
              tag = release.get("tag_name") or release.get("tagName") or ""
              match = semver.fullmatch(tag)
              if not match:
                  continue
              if release.get("isDraft") is not False or release.get("isPrerelease") is not False:
                  continue
              version = tuple(int(part) for part in match.groups())
              if version < current:
                  candidates.append((version, tag))
          if not candidates:
              raise SystemExit(
                  f"no stable published desktop-vX.Y.Z predecessor exists for current version "
                  f"{current_version} in {release_source_repo}"
              )
          print(max(candidates)[1])
          PY
          )"
          previous_version="${previous_tag#desktop-v}"
          previous_dir="${RUNNER_TEMP}/token-place-previous-${previous_tag}"
          rm -rf "${previous_dir}"
          mkdir -p "${previous_dir}"
          gh release download "${previous_tag}" \
            --repo "${release_source_repo}" \
            --dir "${previous_dir}" \
            --pattern "*${previous_version}*.msi" \
            --pattern "*${previous_version}*-setup.exe"
          mapfile -t previous_nsis_paths < <(find "${previous_dir}" -maxdepth 1 -type f -name "*${previous_version}*-setup.exe" | sort)
          mapfile -t previous_msi_paths < <(find "${previous_dir}" -maxdepth 1 -type f -name "*${previous_version}*.msi" | sort)
          if [ "${#previous_nsis_paths[@]}" -ne 1 ] || [ "${#previous_msi_paths[@]}" -ne 1 ]; then
            echo "Expected exactly one ${previous_tag} NSIS installer and one MSI artifact from ${release_source_repo}." >&2
            printf 'Previous NSIS count=%s MSI count=%s\n' "${#previous_nsis_paths[@]}" "${#previous_msi_paths[@]}" >&2
            find "${previous_dir}" -maxdepth 1 -type f -print >&2
            exit 1
          fi
          installer_identity_args=(--expected-version "${current_version}")
          installer_artifact_dir="${RUNNER_TEMP}/token-place-installer-identity-artifacts"
          rm -rf "${installer_artifact_dir}"
          mkdir -p "${installer_artifact_dir}"
          python scripts/test_windows_installer_identity.py \
            --windows-nsis "${nsis_path}" \
            --windows-msi "${msi_path}" \
            --previous-windows-nsis "${previous_nsis_paths[0]}" \
            --previous-windows-msi "${previous_msi_paths[0]}" \
            --previous-version "${previous_version}" \
            --expected-build-id "$(git rev-parse --short=12 HEAD)" \
            --artifact-dir "${installer_artifact_dir}" \
            "${installer_identity_args[@]}"

      - name: Upload Windows installer identity logs
        if: failure() && runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-identity-logs
          path: ${{ runner.temp }}/token-place-installer-identity-artifacts
          if-no-files-found: ignore
          retention-days: 7

      - name: Generate SHA256 checksums and build manifest
        shell: bash
        env:
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          artifact_root = Path('release-artifacts')
          checksum_name = '${{ matrix.checksum_file }}'
          manifest_name = 'token.place-desktop-${{ matrix.tauri_target }}-build-manifest.json'
          files = sorted(
              p for p in artifact_root.iterdir()
              if p.is_file() and p.name not in {checksum_name, manifest_name}
          )
          if not files:
              raise SystemExit('No staged bundle artifacts found in release-artifacts')
          tag = os.environ.get('INPUT_TAG_NAME') or os.environ.get('GITHUB_REF_NAME') or ''
          version = tag.removeprefix('desktop-v') if tag.startswith('desktop-v') else json.loads(Path('package.json').read_text())['version']
          import subprocess
          commit = subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip()
          artifacts = []
          checksums = artifact_root / checksum_name
          with checksums.open('w', encoding='utf-8') as fh:
              for path in files:
                  digest = hashlib.sha256(path.read_bytes()).hexdigest()
                  fh.write(f"{digest}  {path.name}\n")
                  artifacts.append({'filename': path.name, 'sha256': digest})
          manifest = {
              'public_version': version,
              'tag': tag,
              'tagged_commit': commit,
              'target_triple': '${{ matrix.tauri_target }}',
              'bundled_runtime_id': 'bundled-cpython-3.11-win-x86_64-cu124' if '${{ runner.os }}' == 'Windows' else 'bundled-cpython-3.11-macos-arm64',
              'artifacts': artifacts,
          }
          (artifact_root / manifest_name).write_text(json.dumps(manifest, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: desktop-tauri/release-artifacts/*
          if-no-files-found: error
          retention-days: 7

  # Temporarily disabled until a matching self-hosted Windows x64 NVIDIA/RTX
  # runner is configured. GitHub cannot fall through after a short queue wait.
  # When hardware is ready, restore this job's release-event condition and add
  # windows-nvidia-release-gate back to publish.needs.
  windows-nvidia-release-gate:
    name: Windows x64 NVIDIA artifact smoke gate
    needs: build
    runs-on: [self-hosted, Windows, X64, NVIDIA, RTX]
    if: ${{ false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Download Windows release artifacts
        uses: actions/download-artifact@v5
        with:
          name: windows-x64-bundles
          path: release-assets/windows
      - name: Run artifact-backed Windows NVIDIA smoke test
        shell: pwsh
        env:
          TOKEN_PLACE_WINDOWS_NVIDIA_SMOKE_MODEL: ${{ secrets.WINDOWS_NVIDIA_SMOKE_MODEL }}
        run: |
          $setup = Get-ChildItem release-assets/windows -Filter '*-setup.exe' | Sort-Object Name | Select-Object -First 1
          if (-not $setup) { throw 'Windows NSIS setup artifact was not downloaded.' }
          python desktop-tauri/scripts/windows_nvidia_gpu_smoke_test.py --artifact-root release-assets/windows --installer $setup.FullName --mode gpu --context-tier 8k-fast
          python desktop-tauri/scripts/windows_nvidia_gpu_smoke_test.py --artifact-root release-assets/windows --installer $setup.FullName --mode gpu --context-tier 64k-full

  publish:
    name: Publish GitHub Release
    # Intentionally bypass the hardware smoke gate while no matching self-hosted runner exists.
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag_name }}" ]; then
            case "${{ inputs.tag_name }}" in
              desktop-v*) ;;
              *)
                echo "workflow_dispatch input 'tag_name' must match desktop-v*" >&2
                exit 1
                ;;
            esac
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "workflow_dispatch requires inputs.tag_name unless inputs.dry_run=true" >&2
            exit 1
          fi

      - name: Check out repository for immutable tag verification
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - name: Download macOS artifacts
        uses: actions/download-artifact@v5
        with:
          name: macos-arm64-bundles
          path: release-assets/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v5
        with:
          name: windows-x64-bundles
          path: release-assets/windows

      - name: Verify immutable tag, release absence, and artifact provenance
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"
          tag_commit="$(git rev-list -n 1 "${TAG_NAME}")"
          checked_out_commit="$(git rev-parse HEAD)"
          if [ "${tag_commit}" != "${checked_out_commit}" ]; then
            echo "::error::${TAG_NAME} resolves to ${tag_commit}, but checkout resolved ${checked_out_commit}."
            exit 1
          fi
          export TOKENPLACE_TAG_COMMIT="${tag_commit}"
          release_lookup_status=0
          gh api "/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" \
            >/tmp/release-lookup.json 2>/tmp/release-lookup.log || release_lookup_status=$?
          if [ "${release_lookup_status}" -eq 0 ]; then
            echo "::error::Release ${TAG_NAME} already exists; desktop releases are immutable."
            exit 1
          fi
          if ! grep -qi '404' /tmp/release-lookup.log; then
            echo "::error::Unable to confirm release ${TAG_NAME} is absent (gh api did not report HTTP 404)."
            cat /tmp/release-lookup.log >&2
            exit 1
          fi
          gh api --paginate --slurp "/repos/${GITHUB_REPOSITORY}/releases" > /tmp/release-list.json
          python - <<'PY'
          import json, os
          pages = json.loads(open('/tmp/release-list.json', encoding='utf-8').read() or '[]')
          releases = [release for page in pages for release in (page if isinstance(page, list) else [page])]
          if any(release.get('tag_name') == os.environ['TAG_NAME'] for release in releases):
              raise SystemExit(f"Release {os.environ['TAG_NAME']} already exists (including draft); desktop releases are immutable.")
          PY
          version="${TAG_NAME#desktop-v}"
          python - <<'PY'
          import hashlib, json, os, pathlib, re, sys
          version = os.environ['TAG_NAME'].removeprefix('desktop-v')
          EXPECTED_MANIFESTS = {
              'release-assets/macos/token.place-desktop-aarch64-apple-darwin-build-manifest.json': {
                  'target_triple': 'aarch64-apple-darwin',
                  'bundled_runtime_id': 'bundled-cpython-3.11-macos-arm64',
              },
              'release-assets/windows/token.place-desktop-x86_64-pc-windows-msvc-build-manifest.json': {
                  'target_triple': 'x86_64-pc-windows-msvc',
                  'bundled_runtime_id': 'bundled-cpython-3.11-win-x86_64-cu124',
              },
          }
          manifests = sorted(pathlib.Path('release-assets').glob('**/*build-manifest.json'))
          found_paths = {manifest.as_posix() for manifest in manifests}
          expected_paths = set(EXPECTED_MANIFESTS)
          if found_paths != expected_paths:
              missing = sorted(expected_paths - found_paths)
              extra = sorted(found_paths - expected_paths)
              raise SystemExit(f'expected exactly manifests {sorted(expected_paths)}; missing={missing} extra={extra}')
          manifest_names = {manifest.name for manifest in manifests}
          allowed_notice_names = {'README BEFORE OPENING.txt', 'README-macos-apple-silicon-preview.txt'}
          seen_manifested = set()
          for manifest in manifests:
              expected = EXPECTED_MANIFESTS[manifest.as_posix()]
              data = json.loads(manifest.read_text())
              target = data.get('target_triple')
              if target != expected['target_triple']:
                  raise SystemExit(f'{manifest} target_triple mismatch: expected {expected["target_triple"]}, got {target}')
              if data.get('bundled_runtime_id') != expected['bundled_runtime_id']:
                  raise SystemExit(f'{manifest} bundled_runtime_id mismatch: expected {expected["bundled_runtime_id"]}, got {data.get("bundled_runtime_id")}')
              if data.get('tag') != os.environ['TAG_NAME'] or data.get('tagged_commit') != os.environ['TOKENPLACE_TAG_COMMIT'] or data.get('public_version') != version:
                  raise SystemExit(f'{manifest} provenance/version mismatch')
              artifact_names = [artifact.get('filename') for artifact in data.get('artifacts', [])]
              if len(artifact_names) != len(set(artifact_names)):
                  raise SystemExit(f'{manifest} contains duplicate artifact entries')
              for artifact in data.get('artifacts', []):
                  filename = artifact.get('filename')
                  if not filename:
                      raise SystemExit(f'{manifest} contains an artifact without a filename')
                  if filename in seen_manifested:
                      raise SystemExit(f'duplicate artifact across manifests: {filename}')
                  seen_manifested.add(filename)
                  path = manifest.parent / filename
                  if not path.is_file():
                      raise SystemExit(f'manifested artifact is missing: {path}')
                  actual_sha = hashlib.sha256(path.read_bytes()).hexdigest()
                  if actual_sha != artifact.get('sha256'):
                      raise SystemExit(f'artifact sha256 mismatch for {path}')
                  if filename in allowed_notice_names or filename in manifest_names or filename.startswith('SHA256SUMS-'):
                      continue
                  if version not in filename:
                      raise SystemExit(f'artifact filename lacks {version}: {filename}')
                  if target not in filename and filename.endswith('.json'):
                      raise SystemExit(f'manifest artifact has wrong target: {filename} for {target}')
          for asset in pathlib.Path('release-assets').glob('**/*'):
              if not asset.is_file() or asset.name in manifest_names or asset.name.startswith('SHA256SUMS-') or asset.name in allowed_notice_names:
                  continue
              if asset.name not in seen_manifested:
                  raise SystemExit(f'unmanifested release artifact: {asset}')
          PY

      - name: Create immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.tag.outputs.tag }}
          GENERATE_RELEASE_NOTES: ${{ github.event_name == 'push' }}
        run: |
          set -euo pipefail
          # Create an unpublished draft first. Only this invocation's returned
          # release ID is ever mutated or cleaned up. No release ID is ever looked up.
          # No existing release/tag/asset is reused, overwritten, or deleted.
          created_release_id=""
          cleanup_armed=0
          cleanup_created_draft() {
            status=$?
            if [ "${cleanup_armed}" -eq 1 ] && [ -n "${created_release_id}" ]; then
              echo "Cleaning up draft release ${created_release_id} for ${TAG_NAME} after failed publish." >&2
              if ! gh api --method DELETE "/repos/${GITHUB_REPOSITORY}/releases/${created_release_id}" >/tmp/release-cleanup.log 2>&1; then
                echo "::error::Failed to delete draft release ${created_release_id}; manual cleanup may be required." >&2
                cat /tmp/release-cleanup.log >&2
              fi
            fi
            exit "${status}"
          }
          trap cleanup_created_draft EXIT

          create_status=0
          gh api --method POST "/repos/${GITHUB_REPOSITORY}/releases" \
            -f "tag_name=${TAG_NAME}" \
            -f "name=${TAG_NAME}" \
            -F "draft=true" \
            -F "generate_release_notes=${GENERATE_RELEASE_NOTES}" \
            >/tmp/release-create.json 2>/tmp/release-create.log || create_status=$?
          if [ "${create_status}" -ne 0 ]; then
            if grep -qi 'already_exists' /tmp/release-create.log; then
              echo "::error::Release ${TAG_NAME} already exists; desktop releases are immutable."
            else
              echo "::error::Failed to create draft release ${TAG_NAME}."
              cat /tmp/release-create.log >&2
            fi
            exit 1
          fi
          created_release_id="$(jq -r '.id' /tmp/release-create.json)"
          release_id="${created_release_id}"
          upload_url="$(jq -r '.upload_url' /tmp/release-create.json)"
          upload_url="${upload_url%\{*}"
          if [ -z "${release_id}" ] || [ "${release_id}" = "null" ]; then
            echo "::error::GitHub did not return a release id for ${TAG_NAME}." >&2
            exit 1
          fi
          cleanup_armed=1
          if [ -z "${upload_url}" ] || [ "${upload_url}" = "null" ]; then
            echo "::error::GitHub did not return an upload URL for release ${TAG_NAME}." >&2
            exit 1
          fi
          uploaded_count=0
          for asset in release-assets/macos/* release-assets/windows/*; do
            [ -f "${asset}" ] || continue
            asset_name="$(basename "${asset}")"
            encoded_asset_name="$(jq -rn --arg value "${asset_name}" '$value | @uri')"
            echo "Uploading ${asset_name} to draft release ${release_id}..."
            gh api --method POST \
              -H "Content-Type: application/octet-stream" \
              --input "${asset}" \
              "${upload_url}?name=${encoded_asset_name}" >/dev/null
            uploaded_count=$((uploaded_count + 1))
          done
          if [ "${uploaded_count}" -eq 0 ]; then
            echo "::error::No release assets were uploaded for ${TAG_NAME}." >&2
            exit 1
          fi
          gh api --method PATCH "/repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -F "draft=false" >/dev/null
          cleanup_armed=0
          trap - EXIT
