apiVersion: v1
kind: Service
metadata:
  name: {{ include "tokenplace.fullname" . }}
  labels:
    {{- include "tokenplace.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "tokenplace.selectorLabels" . | nindent 4 }}
