name: Build Desktop App

on:
  push:
    branches: [main, master]
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'desktop-v* tag to publish assets to (required for manual runs)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            build_script: package:win
            artifact_name: token-place-desktop-win
            required_artifact_glob: desktop/dist/**/*.exe
          - os: macos-latest
            build_script: package:mac
            artifact_name: token-place-desktop-mac
            required_artifact_glob: desktop/dist/**/*.dmg
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build sources
        run: npm run build
      - name: Package application
        run: npm run ${{ matrix.build_script }}
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.required_artifact_glob }}
          if-no-files-found: error

  publish-release:
    name: Publish Desktop Release Assets
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/desktop-v') ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.tag_name, 'desktop-v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
    steps:
      - name: Validate manual tag input
        if: github.event_name == 'workflow_dispatch'
        run: |
          case "${RELEASE_TAG}" in
            desktop-v*) ;;
            *)
              echo "workflow_dispatch input 'tag_name' must match desktop-v*" >&2
              exit 1
              ;;
          esac

      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: token-place-desktop-win
          path: release-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v5
        with:
          name: token-place-desktop-mac
          path: release-assets/macos

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a7e09a9927dc4bc7a32c
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/windows/**/*.exe
            release-assets/macos/**/*.dmg
