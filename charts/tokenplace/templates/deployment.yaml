apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tokenplace.fullname" . }}
  labels:
    {{- include "tokenplace.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- /*
      Resolve strategy type from a potentially sparse object (e.g. --set-json strategy={})
      so the manifest never renders `type: <no value>`.
  */}}
  {{- $strategyType := default "Recreate" .Values.strategy.type }}
  {{- $existing := lookup "apps/v1" "Deployment" .Release.Namespace (include "tokenplace.fullname" .) }}
  {{- $existingHasRollingUpdate := and $existing $existing.spec $existing.spec.strategy $existing.spec.strategy.rollingUpdate }}
  strategy:
    type: {{ $strategyType }}
    {{- /*
        Keep default Recreate renders free of rollingUpdate keys, but clear the live
        field during upgrades from older defaulted RollingUpdate Deployments.
    */}}
    {{- if and (eq $strategyType "RollingUpdate") .Values.strategy.rollingUpdate }}
    rollingUpdate:
      {{- toYaml .Values.strategy.rollingUpdate | nindent 6 }}
    {{- else if and (eq $strategyType "Recreate") $existingHasRollingUpdate }}
    rollingUpdate: null
    {{- end }}
  selector:
    matchLabels:
      {{- include "tokenplace.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tokenplace.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "tokenplace.fullname" . }}
      {{- else if .Values.serviceAccount.name }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: relay
          {{- $relayPort := printf "%v" .Values.containerPort }}
          {{- $selfDispatchURL := "http://127.0.0.1:$(RELAY_PORT)" }}
          {{- $deployEnv := default "" .Values.deployEnv }}
          {{- if and (not $deployEnv) .Values.ingress.host }}
          {{- if eq .Values.ingress.host "token.place" }}
          {{- $deployEnv = "prod" }}
          {{- else if eq .Values.ingress.host "staging.token.place" }}
          {{- $deployEnv = "staging" }}
          {{- end }}
          {{- end }}
          {{- $deployEnv = default "dev" $deployEnv }}
          {{- $defaultEnv := dict
                "RELAY_HOST" (dict "name" "RELAY_HOST" "value" "0.0.0.0")
                "RELAY_PORT" (dict "name" "RELAY_PORT" "value" $relayPort)
                "RELAY_WORKERS" (dict "name" "RELAY_WORKERS" "value" "1")
                "RELAY_THREADS" (dict "name" "RELAY_THREADS" "value" "4")
                "TOKENPLACE_RELAY_INTERNAL_URL" (dict "name" "TOKENPLACE_RELAY_INTERNAL_URL" "value" $selfDispatchURL)
                "TOKENPLACE_FRONTEND_MODE" (dict "name" "TOKENPLACE_FRONTEND_MODE" "value" "production")
                "TOKENPLACE_RELEASE_VERSION" (dict "name" "TOKENPLACE_RELEASE_VERSION" "value" .Chart.AppVersion)
                "TOKENPLACE_CHART_VERSION" (dict "name" "TOKENPLACE_CHART_VERSION" "value" .Chart.Version)
                "TOKENPLACE_IMAGE_TAG" (dict "name" "TOKENPLACE_IMAGE_TAG" "value" .Values.image.tag)
                "TOKENPLACE_DEPLOY_ENV" (dict "name" "TOKENPLACE_DEPLOY_ENV" "value" $deployEnv)
                "TOKENPLACE_RELAY_REQUIRE_UPSTREAM_HEALTH" (dict "name" "TOKENPLACE_RELAY_REQUIRE_UPSTREAM_HEALTH" "value" "0")
                "XDG_CONFIG_HOME" (dict "name" "XDG_CONFIG_HOME" "value" "/tmp/.config")
                "XDG_DATA_HOME" (dict "name" "XDG_DATA_HOME" "value" "/tmp/.local/share")
                "XDG_CACHE_HOME" (dict "name" "XDG_CACHE_HOME" "value" "/tmp/.cache")
                "XDG_STATE_HOME" (dict "name" "XDG_STATE_HOME" "value" "/tmp/.local/state")
          }}
          {{- $mergedEnv := deepCopy $defaultEnv }}
          {{- if and .Values.ingress.enabled .Values.ingress.host }}
          {{- $_ := set $mergedEnv "TOKENPLACE_RELAY_PUBLIC_URL" (dict "name" "TOKENPLACE_RELAY_PUBLIC_URL" "value" (printf "https://%s" .Values.ingress.host)) }}
          {{- end }}
          {{- if kindIs "map" .Values.env }}
          {{- range $key, $val := .Values.env }}
          {{- $name := (printf "%v" $key) }}
          {{- if kindIs "map" $val }}
          {{- $entry := deepCopy $val }}
          {{- if not (hasKey $entry "name") }}
          {{- $_ := set $entry "name" $name }}
          {{- end }}
          {{- $_ := set $mergedEnv $name $entry }}
          {{- else }}
          {{- $_ := set $mergedEnv $name (dict "name" $name "value" (printf "%v" $val)) }}
          {{- end }}
          {{- end }}
          {{- else if kindIs "slice" .Values.env }}
          {{- range $item := .Values.env }}
          {{- if and (kindIs "map" $item) (hasKey $item "name") }}
          {{- $name := (printf "%v" (get $item "name")) }}
          {{- $_ := set $mergedEnv $name (deepCopy $item) }}
          {{- end }}
          {{- end }}
          {{- end }}
          {{- if kindIs "slice" .Values.extraEnv }}
          {{- range $item := .Values.extraEnv }}
          {{- if and (kindIs "map" $item) (hasKey $item "name") }}
          {{- $name := (printf "%v" (get $item "name")) }}
          {{- $_ := set $mergedEnv $name (deepCopy $item) }}
          {{- end }}
          {{- end }}
          {{- end }}
          image: {{ include "tokenplace.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            {{- range $key := keys $mergedEnv | sortAlpha }}
            {{- $entry := get $mergedEnv $key }}
            - name: {{ $key }}
              {{- if and (kindIs "map" $entry) (hasKey $entry "valueFrom") }}
              valueFrom:
                {{- toYaml (get $entry "valueFrom") | nindent 16 }}
              {{- else if and (kindIs "map" $entry) (hasKey $entry "value") }}
              value: {{ get $entry "value" | quote }}
              {{- else }}
              value: ""
              {{- end }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.preStop.enabled }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "kill -s TERM 1 || true; sleep {{ .Values.preStop.sleepSeconds }}"
          {{- end }}
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
