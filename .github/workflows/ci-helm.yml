name: Publish Helm chart
env:
  HELM_VERSION: v3.17.3

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to publish
        required: false
        default: main

jobs:
  validate-and-package:
    name: Validate and package chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      chart_version: ${{ steps.chart_meta.outputs.chart_version }}
      package_file: ${{ steps.package.outputs.package_file }}
      chart_ref: ${{ steps.chart_meta.outputs.chart_ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Build chart dependencies when lock file exists
        if: ${{ hashFiles('charts/tokenplace/Chart.lock') != '' }}
        run: helm dependency build charts/tokenplace

      - name: Lint chart
        run: helm lint charts/tokenplace

      - name: Template smoke render (staging-like)
        run: |
          helm template tokenplace charts/tokenplace \
            --namespace tokenplace \
            --set ingress.enabled=true \
            --set ingress.host=staging.token.place \
            --set image.tag=main-deadbee > /tmp/tokenplace-render.yaml

          grep -n "replicas: 1" /tmp/tokenplace-render.yaml
          grep -n "strategy:" -A4 /tmp/tokenplace-render.yaml
          grep -n "type: Recreate" /tmp/tokenplace-render.yaml
          grep -n "name: RELAY_WORKERS" -A2 /tmp/tokenplace-render.yaml | grep -n 'value: "1"'
          grep -n "name: XDG_CONFIG_HOME" -A2 /tmp/tokenplace-render.yaml | grep -n 'value: "/tmp/.config"'
          grep -n "name: XDG_DATA_HOME" -A2 /tmp/tokenplace-render.yaml | grep -n 'value: "/tmp/.local/share"'
          grep -n "name: XDG_CACHE_HOME" -A2 /tmp/tokenplace-render.yaml | grep -n 'value: "/tmp/.cache"'
          grep -n "name: XDG_STATE_HOME" -A2 /tmp/tokenplace-render.yaml | grep -n 'value: "/tmp/.local/state"'
          ! grep -n "rollingUpdate:" /tmp/tokenplace-render.yaml

      - name: Install Python dependency for duplicate-env check
        run: pip3 install PyYAML

      - name: Duplicate-env validation
        run: |
          python3 - <<'PY'
          import collections
          import yaml

          docs = list(yaml.safe_load_all(open("/tmp/tokenplace-render.yaml", encoding="utf-8")))
          deploy = next(d for d in docs if d and d.get("kind") == "Deployment")
          env = deploy["spec"]["template"]["spec"]["containers"][0]["env"]
          names = [item["name"] for item in env]
          dupes = [name for name, count in collections.Counter(names).items() if count > 1]
          assert not dupes, dupes
          PY

      - name: Template strategy-empty fallback smoke render
        run: |

          helm template tokenplace charts/tokenplace \
            --namespace tokenplace \
            --set ingress.enabled=true \
            --set ingress.host=staging.token.place \
            --set image.tag=main-deadbee \
            --set-json strategy={} > /tmp/tokenplace-render-strategy-empty.yaml

          grep -n "type: Recreate" /tmp/tokenplace-render-strategy-empty.yaml
          ! grep -n "rollingUpdate:" /tmp/tokenplace-render-strategy-empty.yaml

          # Upgrade-path guard: template retains explicit stale-field clear branch
          # when switching live defaulted RollingUpdate Deployments to Recreate.
          grep -n 'else if and (eq $strategyType "Recreate") $existingHasRollingUpdate' charts/tokenplace/templates/deployment.yaml
          grep -n 'rollingUpdate: null' charts/tokenplace/templates/deployment.yaml

      - name: Relay container read-only rootfs smoke test
        run: |
          set -euo pipefail
          docker build -t tokenplace-relay:chart-smoke .
          docker run -d --rm --name tokenplace-relay-readonly --read-only --tmpfs /tmp \
            -p 127.0.0.1:5010:5010 \
            -e TOKENPLACE_RELAY_REQUIRE_UPSTREAM_HEALTH=0 \
            -e XDG_CONFIG_HOME=/tmp/.config \
            -e XDG_DATA_HOME=/tmp/.local/share \
            -e XDG_CACHE_HOME=/tmp/.cache \
            -e XDG_STATE_HOME=/tmp/.local/state \
            tokenplace-relay:chart-smoke
          trap 'docker logs tokenplace-relay-readonly || true; docker stop tokenplace-relay-readonly || true' EXIT
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5010/livez >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:5010/livez
          curl -fsS http://127.0.0.1:5010/healthz
          curl -fsS http://127.0.0.1:5010/
          curl -fsS http://127.0.0.1:5010/metrics

      - name: Capture chart metadata
        id: chart_meta
        run: |
          set -euo pipefail
          chart_name="$(helm show chart charts/tokenplace | awk -F': ' '/^name:/{print $2}')"
          chart_version="$(helm show chart charts/tokenplace | awk -F': ' '/^version:/{print $2}')"
          chart_ref="oci://ghcr.io/futuroptimist/charts/${chart_name}"
          test "${chart_name}" = "tokenplace"
          test "${chart_ref}" = "oci://ghcr.io/futuroptimist/charts/tokenplace"
          echo "chart_version=${chart_version}" >> "$GITHUB_OUTPUT"
          echo "chart_ref=${chart_ref}" >> "$GITHUB_OUTPUT"

      - name: Package chart
        id: package
        run: |
          set -euo pipefail
          mkdir -p dist
          helm package charts/tokenplace --destination dist
          package_file="$(find dist -maxdepth 1 -type f -name '*.tgz' | head -n 1)"
          test -n "${package_file}"
          test -f "${package_file}"
          echo "package_file=${package_file}" >> "$GITHUB_OUTPUT"

      - name: Upload chart package artifact
        uses: actions/upload-artifact@v4
        with:
          name: tokenplace-chart-package
          path: ${{ steps.package.outputs.package_file }}

      - name: Publish validation summary
        run: |
          {
            echo "## Helm chart validation"
            echo ""
            echo "Chart reference: \`${{ steps.chart_meta.outputs.chart_ref }}\`"
            echo "Chart version: \`${{ steps.chart_meta.outputs.chart_version }}\`"
            echo "Packaged artifact: \`${{ steps.package.outputs.package_file }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish chart to GHCR OCI
    runs-on: ubuntu-latest
    needs: validate-and-package
    if: github.event_name != 'pull_request' && github.repository == 'futuroptimist/token.place'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download packaged chart artifact
        uses: actions/download-artifact@v4
        with:
          name: tokenplace-chart-package
          path: dist

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Push chart to OCI registry
        id: push
        run: |
          set -euo pipefail
          package_file="$(find dist -maxdepth 1 -type f -name '*.tgz' | head -n 1)"
          test -n "${package_file}"
          test -f "${package_file}"
          chart_ref="${{ needs.validate-and-package.outputs.chart_ref }}"
          chart_registry="${chart_ref%/*}"
          if helm show chart "${chart_ref}" --version "${{ needs.validate-and-package.outputs.chart_version }}" >/dev/null 2>&1; then
            echo "Chart ${chart_ref}:${{ needs.validate-and-package.outputs.chart_version }} already exists. Refusing to overwrite immutable OCI artifact; stop and resolve manually." >&2
            exit 1
          fi
          helm push "${package_file}" "${chart_registry}"
          echo "chart_ref=${chart_ref}" >> "$GITHUB_OUTPUT"

      - name: Publish chart summary
        run: |
          {
            echo "## Helm chart published"
            echo ""
            echo "Chart reference: \`${{ steps.push.outputs.chart_ref }}\`"
            echo "Chart version: \`${{ needs.validate-and-package.outputs.chart_version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
