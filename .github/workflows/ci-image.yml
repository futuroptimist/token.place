name: Build and publish GHCR relay image

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build for validation only
        required: false
        default: main

jobs:
  build-and-smoke:
    name: Build and smoke-test relay image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      short_sha: ${{ steps.tags.outputs.short_sha }}
      created: ${{ steps.tags.outputs.created }}
      repository: ${{ steps.tags.outputs.repository }}
      publish_tags: ${{ steps.tags.outputs.publish_tags }}
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
      ref_kind: ${{ steps.tags.outputs.ref_kind }}
      semver_tag: ${{ steps.tags.outputs.semver_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Compute image metadata and tags
        id: tags
        run: |
          set -euo pipefail

          event_name="${GITHUB_EVENT_NAME}"
          ref="${GITHUB_REF}"
          ref_kind="other"
          semver_tag=""

          short_sha="$(git rev-parse --short=7 HEAD)"
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          repository="ghcr.io/futuroptimist/tokenplace-relay"
          sha_tag="${repository}:sha-${short_sha}"
          publish_tags="${sha_tag}"

          if [[ "${event_name}" == "push" && "${ref}" == "refs/heads/main" ]]; then
            ref_kind="main"
            publish_tags="${repository}:main-${short_sha}"$'\n'"${repository}:main-latest"$'\n'"${sha_tag}"
          elif [[ "${event_name}" == "push" && "${ref}" == refs/tags/* ]]; then
            ref_kind="tag"
            semver_tag="${ref#refs/tags/}"
            if [[ ! "${semver_tag}" =~ ^v(0|[1-9][0-9]*)[.](0|[1-9][0-9]*)[.](0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)([.](0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*))?$ ]]; then
              echo "Malformed semver tag ref (expected vX.Y.Z with optional prerelease): ${ref}" >&2
              exit 1
            fi
            if [[ "${semver_tag}" == *+* ]]; then
              echo "Build metadata (+...) is not allowed for Docker tag safety: ${semver_tag}" >&2
              exit 1
            fi
            if [[ "${semver_tag}" =~ [^A-Za-z0-9._-] ]]; then
              echo "Unsafe docker tag derived from ref: ${semver_tag}" >&2
              exit 1
            fi
            publish_tags="${repository}:${semver_tag}"$'\n'"${sha_tag}"
          fi

          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "created=${created}" >> "$GITHUB_OUTPUT"
          echo "repository=${repository}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${sha_tag}" >> "$GITHUB_OUTPUT"
          echo "ref_kind=${ref_kind}" >> "$GITHUB_OUTPUT"
          echo "semver_tag=${semver_tag}" >> "$GITHUB_OUTPUT"
          echo "publish_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${publish_tags}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build relay image locally for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          provenance: false
          tags: tokenplace-relay:smoke
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.tags.outputs.short_sha }}
            org.opencontainers.image.created=${{ steps.tags.outputs.created }}
          cache-from: type=gha,scope=relay-image
          cache-to: type=gha,mode=max,scope=relay-image

      - name: Smoke test relay container
        run: |
          set -euo pipefail

          docker run -d --rm --name tokenplace-relay-smoke \
            -p 127.0.0.1:5010:5010 \
            -e TOKENPLACE_RELAY_REQUIRE_UPSTREAM_HEALTH=0 \
            tokenplace-relay:smoke

          cleanup() {
            echo "--- container logs ---"
            docker logs tokenplace-relay-smoke || true
            docker stop tokenplace-relay-smoke >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5010/livez \
              && curl -fsS http://127.0.0.1:5010/healthz \
              && curl -fsS http://127.0.0.1:5010/ >/dev/null \
              && curl -fsS http://127.0.0.1:5010/metrics >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:5010/livez >/dev/null
          curl -fsS http://127.0.0.1:5010/healthz >/dev/null
          curl -fsS http://127.0.0.1:5010/ >/dev/null
          curl -fsS http://127.0.0.1:5010/metrics >/dev/null

          docker exec tokenplace-relay-smoke sh -c "tr '\\0' ' ' < /proc/1/cmdline" | grep -F -- '--workers 1'

      - name: Smoke test relay container on read-only rootfs
        run: |
          set -euo pipefail

          docker run -d --rm --name tokenplace-relay-smoke-readonly \
            --read-only --tmpfs /tmp \
            -p 127.0.0.1:5011:5010 \
            -e TOKENPLACE_RELAY_REQUIRE_UPSTREAM_HEALTH=0 \
            -e XDG_CONFIG_HOME=/tmp/.config \
            -e XDG_DATA_HOME=/tmp/.local/share \
            -e XDG_CACHE_HOME=/tmp/.cache \
            -e XDG_STATE_HOME=/tmp/.local/state \
            tokenplace-relay:smoke

          cleanup() {
            echo "--- readonly container logs ---"
            docker logs tokenplace-relay-smoke-readonly || true
            docker stop tokenplace-relay-smoke-readonly >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5011/livez \
              && curl -fsS http://127.0.0.1:5011/healthz \
              && curl -fsS http://127.0.0.1:5011/ >/dev/null \
              && curl -fsS http://127.0.0.1:5011/metrics >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:5011/livez >/dev/null
          curl -fsS http://127.0.0.1:5011/healthz >/dev/null
          curl -fsS http://127.0.0.1:5011/ >/dev/null
          curl -fsS http://127.0.0.1:5011/metrics >/dev/null
          docker exec tokenplace-relay-smoke-readonly sh -c "tr '\\0' ' ' < /proc/1/cmdline" | grep -F -- '--workers 1'

      - name: Publish validation summary
        run: |
          {
            echo "## Relay image validation"
            echo ""
            echo "Repository: `${{ steps.tags.outputs.repository }}`"
            echo "Built ref SHA: `${{ steps.tags.outputs.short_sha }}`"
            echo "Canonical Dockerfile: `Dockerfile`"
            echo ""
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              echo "Pull request run: build and smoke-test only; no GHCR tags were published."
            elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              echo "Manual dispatch run: build and smoke-test only; no GHCR tags were published. Push to `main` or a semver `vX.Y.Z` tag to publish."
            else
              echo "Publishing is handled by the downstream publish job for eligible push refs."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish relay image
    runs-on: ubuntu-latest
    needs: build-and-smoke
    if: github.event_name == 'push' && github.repository == 'futuroptimist/token.place' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (arm64 for push)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ needs.build-and-smoke.outputs.publish_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.build-and-smoke.outputs.short_sha }}
            org.opencontainers.image.created=${{ needs.build-and-smoke.outputs.created }}
          cache-from: type=gha,scope=relay-image
          cache-to: type=gha,mode=max,scope=relay-image

      - name: Publish workflow summary
        run: |
          {
            echo "## Relay image tags"
            echo ""
            if [[ "${{ needs.build-and-smoke.outputs.ref_kind }}" == "main" ]]; then
              echo "Immutable tag to deploy with Sugarkube: \`ghcr.io/futuroptimist/tokenplace-relay:main-${{ needs.build-and-smoke.outputs.short_sha }}\`"
              echo "Sugarkube tag argument: \`tag=main-${{ needs.build-and-smoke.outputs.short_sha }}\`"
              echo "Mutable tag: \`ghcr.io/futuroptimist/tokenplace-relay:main-latest\`"
            elif [[ "${{ needs.build-and-smoke.outputs.ref_kind }}" == "tag" ]]; then
              echo "Immutable release tag to deploy with Sugarkube: \`ghcr.io/futuroptimist/tokenplace-relay:${{ needs.build-and-smoke.outputs.semver_tag }}\`"
              echo "Sugarkube tag argument: \`tag=${{ needs.build-and-smoke.outputs.semver_tag }}\`"
            fi
            echo "SHA tag: \`${{ needs.build-and-smoke.outputs.sha_tag }}\`"
            echo ""
            echo "Pushed: true"
          } >> "$GITHUB_STEP_SUMMARY"
