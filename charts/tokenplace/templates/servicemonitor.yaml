{{- if .Values.serviceMonitor.enabled }}
{{- if not .Values.metrics.enabled }}{{ fail "metrics.enabled=true is required when serviceMonitor.enabled=true" }}{{- end }}
{{- $metricsSecret := required "metrics.auth.existingSecret is required when serviceMonitor.enabled=true" .Values.metrics.auth.existingSecret }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "tokenplace.fullname" . }}
  labels:
    {{- $serviceMonitorLabels := mergeOverwrite (deepCopy (.Values.serviceMonitor.additionalLabels | default dict)) (include "tokenplace.labels" . | fromYaml) }}
    {{- toYaml $serviceMonitorLabels | nindent 4 }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "tokenplace.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: "/metrics"
      interval: {{ .Values.serviceMonitor.interval | quote }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout | quote }}
      authorization:
        type: Bearer
        credentials:
          name: {{ $metricsSecret | quote }}
          key: {{ .Values.metrics.auth.secretKey | quote }}
      {{- $relabelings := .Values.serviceMonitor.relabelings | default dict }}
      {{- if or $relabelings.app $relabelings.environment $relabelings.release $relabelings.cluster }}
      relabelings:
        {{- with $relabelings.app }}
        - action: replace
          targetLabel: app
          replacement: {{ . | quote }}
        {{- end }}
        {{- with $relabelings.environment }}
        - action: replace
          targetLabel: environment
          replacement: {{ . | quote }}
        {{- end }}
        {{- with $relabelings.release }}
        - action: replace
          targetLabel: release
          replacement: {{ . | quote }}
        {{- end }}
        {{- with $relabelings.cluster }}
        - action: replace
          targetLabel: cluster
          replacement: {{ . | quote }}
        {{- end }}
      {{- end }}
{{- end }}
