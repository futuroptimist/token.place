name: Build and publish GHCR relay image

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build
        required: false
        default: main

jobs:
  build-and-smoke:
    name: Build and smoke-test relay image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      short_sha: ${{ steps.tags.outputs.short_sha }}
      created: ${{ steps.tags.outputs.created }}
      repository: ${{ steps.tags.outputs.repository }}
      main_branch_tag: ${{ steps.tags.outputs.main_branch_tag }}
      latest_tag: ${{ steps.tags.outputs.latest_tag }}
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
      semver_tag: ${{ steps.tags.outputs.semver_tag }}
      publish_tags: ${{ steps.tags.outputs.publish_tags }}
      publish_mode: ${{ steps.tags.outputs.publish_mode }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Compute image metadata and tags
        id: tags
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=7 HEAD)"
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          repository="ghcr.io/futuroptimist/tokenplace-relay"

          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "created=${created}" >> "$GITHUB_OUTPUT"
          echo "repository=${repository}" >> "$GITHUB_OUTPUT"
          echo "main_branch_tag=${repository}:main-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${repository}:main-latest" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${repository}:sha-${short_sha}" >> "$GITHUB_OUTPUT"

          publish_mode="none"
          semver_tag=""
          publish_tags="${repository}:sha-${short_sha}"

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            publish_mode="main"
            publish_tags="${repository}:main-${short_sha}"$'\n'"${repository}:main-latest"$'\n'"${repository}:sha-${short_sha}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" =~ ^refs/tags/v[0-9].* ]]; then
            tag_name="${GITHUB_REF#refs/tags/}"
            if [[ ! "${tag_name}" =~ ^v[0-9]+(\.[0-9]+){2}([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Malformed release tag '${tag_name}'. Expected semver-like 'v<major>.<minor>.<patch>'." >&2
              exit 1
            fi
            if [[ "${tag_name}" == *"/"* || "${tag_name}" == *":"* || "${tag_name}" == "." || "${tag_name}" == ".." ]]; then
              echo "Unsafe Docker tag computed from '${tag_name}'." >&2
              exit 1
            fi
            semver_tag="${repository}:${tag_name}"
            publish_mode="tag"
            publish_tags="${semver_tag}"$'\n'"${repository}:sha-${short_sha}"
          fi

          if [[ -z "${publish_tags}" ]]; then
            echo "Refusing to continue: computed publish tags are empty." >&2
            exit 1
          fi

          echo "semver_tag=${semver_tag}" >> "$GITHUB_OUTPUT"
          echo "publish_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${publish_tags}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "publish_mode=${publish_mode}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build relay image locally for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          provenance: false
          tags: tokenplace-relay:smoke
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.tags.outputs.short_sha }}
            org.opencontainers.image.created=${{ steps.tags.outputs.created }}
          cache-from: type=gha,scope=relay-image
          cache-to: type=gha,mode=max,scope=relay-image

      - name: Smoke test relay container
        run: |
          set -euo pipefail

          docker run -d --rm --name tokenplace-relay-smoke \
            -p 127.0.0.1:5010:5010 \
            -e TOKENPLACE_RELAY_REQUIRE_UPSTREAM_HEALTH=0 \
            tokenplace-relay:smoke

          cleanup() {
            echo "--- container logs ---"
            docker logs tokenplace-relay-smoke || true
            docker stop tokenplace-relay-smoke >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5010/livez \
              && curl -fsS http://127.0.0.1:5010/healthz \
              && curl -fsS http://127.0.0.1:5010/ >/dev/null \
              && curl -fsS http://127.0.0.1:5010/metrics >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:5010/livez >/dev/null
          curl -fsS http://127.0.0.1:5010/healthz >/dev/null
          curl -fsS http://127.0.0.1:5010/ >/dev/null
          curl -fsS http://127.0.0.1:5010/metrics >/dev/null

          docker exec tokenplace-relay-smoke sh -c "tr '\\0' ' ' < /proc/1/cmdline" | grep -F -- '--workers 1'

  publish:
    name: Publish relay image
    runs-on: ubuntu-latest
    needs: build-and-smoke
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (arm64 for push)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ needs.build-and-smoke.outputs.publish_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.build-and-smoke.outputs.short_sha }}
            org.opencontainers.image.created=${{ needs.build-and-smoke.outputs.created }}
          cache-from: type=gha,scope=relay-image
          cache-to: type=gha,mode=max,scope=relay-image

      - name: Publish workflow summary
        run: |
          {
            echo "## Relay image tags"
            echo ""
            echo "Publish mode: \`${{ needs.build-and-smoke.outputs.publish_mode }}\`"
            echo "Source ref: \`${{ github.ref }}\`"
            echo ""
            echo "Pushed tags:"
            while IFS= read -r tag; do
              [ -n "$tag" ] && echo "- \`$tag\`"
            done <<'EOF'
            ${{ needs.build-and-smoke.outputs.publish_tags }}
            EOF
            echo ""
            echo "Pushed: true"
          } >> "$GITHUB_STEP_SUMMARY"
