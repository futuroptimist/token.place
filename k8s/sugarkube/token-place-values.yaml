# Deprecated local compatibility values for ad-hoc Kubernetes experiments.
# Sugarkube staging/prod values live in the Sugarkube repo and deploy the
# canonical OCI chart with an immutable GHCR image tag.

image:
  repository: ghcr.io/futuroptimist/tokenplace-relay
  tag: main-latest

env:
  XDG_CONFIG_HOME: /tmp/.config
  XDG_DATA_HOME: /tmp/.local/share
  XDG_CACHE_HOME: /tmp/.cache
  XDG_STATE_HOME: /tmp/.local/state
