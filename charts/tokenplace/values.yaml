replicaCount: 1

strategy:
  type: Recreate

image:
  repository: ghcr.io/futuroptimist/tokenplace-relay
  tag: "main-latest"
  digest: ""
  pullPolicy: Always

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

containerPort: 5010

# Public release environment label for the landing badge; blank infers from ingress.host.
deployEnv: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  host: ""
  annotations: {}
  tls:
    enabled: false
    secretName: ""

env:
  XDG_CONFIG_HOME: /tmp/.config
  XDG_DATA_HOME: /tmp/.local/share
  XDG_CACHE_HOME: /tmp/.cache
  XDG_STATE_HOME: /tmp/.local/state
extraEnv: []
envFrom: []

terminationGracePeriodSeconds: 30
preStop:
  enabled: true
  sleepSeconds: 5

probes:
  liveness:
    initialDelaySeconds: 20
    periodSeconds: 20
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 6

nodeSelector: {}
tolerations: []
affinity: {}
