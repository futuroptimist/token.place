{{- if .Values.networkPolicy.enabled }}
{{- $np := .Values.networkPolicy }}
{{- $dnsSelector := coalesce $np.kubeDNSSelector (dict "matchLabels" (dict "k8s-app" "kube-dns")) }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tokenplace.fullname" . }}
  labels:
    {{- include "tokenplace.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tokenplace.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
  {{- $ingressState := dict "has" false }}
  {{- range $np.ingressNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
      ports:
        - protocol: TCP
          port: {{ $.Values.service.port }}
    {{- $_ := set $ingressState "has" true }}
  {{- end }}
  {{- range $np.extraIngress }}
    - {{- toYaml . | nindent 6 }}
    {{- $_ := set $ingressState "has" true }}
  {{- end }}
  {{- if not $ingressState.has }}
    []
  {{- end }}
  egress:
  {{- $egressState := dict "has" false }}
  {{- if $np.allowDNS }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $np.dnsNamespace }}
          podSelector:
            {{- toYaml $dnsSelector | nindent 12 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- $_ := set $egressState "has" true }}
  {{- end }}
  {{- range $np.extraEgress }}
    - {{- toYaml . | nindent 6 }}
    {{- $_ := set $egressState "has" true }}
  {{- end }}
  {{- if not $egressState.has }}
    []
  {{- end }}
{{- end }}
