name: Desktop Tauri Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Existing tag to publish (for recovery)'
        required: false
        default: ''

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: desktop-tauri/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop-tauri/src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: desktop-tauri

      - name: Build desktop bundle and publish assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop-tauri
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag_name }}
          releaseName: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag_name }}
          releaseBody: 'Automated desktop-tauri release artifacts.'
          releaseDraft: false
          prerelease: false
          includeRelease: ${{ github.ref_type == 'tag' || inputs.tag_name != '' }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Generate bundle checksums
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ matrix.platform }}" = 'windows-latest' ]; then
            BUNDLE_DIR='desktop-tauri/src-tauri/target/release/bundle'
          else
            BUNDLE_DIR='desktop-tauri/src-tauri/target/aarch64-apple-darwin/release/bundle'
          fi

          mapfile -t BUNDLE_FILES < <(
            find "$BUNDLE_DIR" -type f \(
              -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.zip' -o
              -name '*.msi' -o -name '*.exe'
            \) | sort
          )

          if [ "${#BUNDLE_FILES[@]}" -eq 0 ]; then
            echo 'No desktop bundle artifacts found to checksum.'
            exit 1
          fi

          CHECKSUM_FILE="desktop-tauri-${{ runner.os }}-checksums.txt"
          : > "$CHECKSUM_FILE"
          for file in "${BUNDLE_FILES[@]}"; do
            sha256sum "$file" >> "$CHECKSUM_FILE"
          done

      - name: Upload checksums to release
        if: ${{ github.ref_type == 'tag' || inputs.tag_name != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.ref_type == 'tag' && github.ref_name || inputs.tag_name }}"
          gh release upload "$TAG_NAME" "desktop-tauri-${{ runner.os }}-checksums.txt" --clobber
