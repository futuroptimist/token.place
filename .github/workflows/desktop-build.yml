name: Build Desktop App

on:
  push:
    branches: [ main, master ]
    tags:
      - 'desktop-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            build_script: package:win
            artifact_name: token-place-desktop-win
          - os: macos-latest
            build_script: package:mac
            artifact_name: token-place-desktop-mac
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build sources
        run: npm run build
      - name: Package application
        run: npm run ${{ matrix.build_script }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            desktop/dist/**/*.exe
            desktop/dist/**/*.dmg
            desktop/dist/**/*.zip
            desktop/dist/**/*.pkg
          if-no-files-found: error

  publish-release:
    name: Publish Desktop Release Assets
    needs: build
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: token-place-desktop-win
          path: release-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: token-place-desktop-mac
          path: release-assets/macos

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/windows/**/*.exe
            release-assets/windows/**/*.zip
            release-assets/windows/**/*.msi
            release-assets/macos/**/*.dmg
            release-assets/macos/**/*.zip
            release-assets/macos/**/*.pkg
