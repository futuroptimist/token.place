name: Publish Helm chart
env:
  HELM_VERSION: v3.17.3

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to validate/package
        required: false
        default: main
      publish:
        description: Publish this ref when the chart version is new
        required: false
        type: boolean
        default: false

jobs:
  validate-and-package:
    name: Validate and package chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      chart_version: ${{ steps.chart_meta.outputs.chart_version }}
      package_file: ${{ steps.package.outputs.package_file }}
      chart_ref: ${{ steps.chart_meta.outputs.chart_ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Build chart dependencies when lock file exists
        if: ${{ hashFiles('charts/tokenplace/Chart.lock') != '' }}
        run: helm dependency build charts/tokenplace

      - name: Lint chart
        run: helm lint charts/tokenplace

      - name: Template smoke render (staging-like)
        run: |
          helm template tokenplace charts/tokenplace \
            --namespace tokenplace \
            --set ingress.enabled=true \
            --set ingress.host=staging.token.place \
            --set image.tag=main-deadbee > /tmp/tokenplace-render.yaml

          grep -n "replicas: 1" /tmp/tokenplace-render.yaml
          grep -n "strategy:" -A4 /tmp/tokenplace-render.yaml
          grep -n "type: Recreate" /tmp/tokenplace-render.yaml
          grep -n "name: RELAY_WORKERS" -A2 /tmp/tokenplace-render.yaml | grep -n 'value: "1"'
          grep -n "name: RELAY_THREADS" -A2 /tmp/tokenplace-render.yaml | grep -n 'value: "4"'
          grep -n "name: TOKENPLACE_RELAY_INTERNAL_URL" -A2 /tmp/tokenplace-render.yaml | grep -n 'value: "http://127.0.0.1:$(RELAY_PORT)"'
          ! grep -n "name: TOKENPLACE_API_V1_DISTRIBUTED_RELAY_URL" /tmp/tokenplace-render.yaml
          ! grep -n "name: TOKENPLACE_DISTRIBUTED_COMPUTE_URL" /tmp/tokenplace-render.yaml
          grep -n "name: TOKENPLACE_RELAY_PUBLIC_URL" -A2 /tmp/tokenplace-render.yaml | grep -n 'value: "https://staging.token.place"'
          ! grep -n 'value: "https://token.place"' /tmp/tokenplace-render.yaml
          grep -n "name: XDG_CONFIG_HOME" -A2 /tmp/tokenplace-render.yaml | grep -n 'value: "/tmp/.config"'
          grep -n "name: XDG_DATA_HOME" -A2 /tmp/tokenplace-render.yaml | grep -n 'value: "/tmp/.local/share"'
          grep -n "name: XDG_CACHE_HOME" -A2 /tmp/tokenplace-render.yaml | grep -n 'value: "/tmp/.cache"'
          grep -n "name: XDG_STATE_HOME" -A2 /tmp/tokenplace-render.yaml | grep -n 'value: "/tmp/.local/state"'
          ! grep -n "rollingUpdate:" /tmp/tokenplace-render.yaml

      - name: Template relay port override smoke render
        run: |
          helm template tokenplace charts/tokenplace \
            --namespace tokenplace \
            --set env.RELAY_PORT=6000 \
            --set ingress.enabled=true \
            --set ingress.host=staging.token.place \
            --set ingress.tls.enabled=true \
            --set ingress.tls.secretName=tokenplace-staging-tls \
            --set image.tag=main-deadbee > /tmp/tokenplace-render-port.yaml

          grep -n -E '127\.0\.0\.1:(6000|\$\(RELAY_PORT\))' /tmp/tokenplace-render-port.yaml

      - name: Install Python dependency for duplicate-env check
        run: pip3 install PyYAML

      - name: Duplicate-env validation
        run: |
          python3 - <<'PY'
          import collections
          import yaml

          docs = list(yaml.safe_load_all(open("/tmp/tokenplace-render.yaml", encoding="utf-8")))
          deploy = next(d for d in docs if d and d.get("kind") == "Deployment")
          env = deploy["spec"]["template"]["spec"]["containers"][0]["env"]
          names = [item["name"] for item in env]
          dupes = [name for name, count in collections.Counter(names).items() if count > 1]
          assert not dupes, dupes
          PY


      - name: Template list-style env render check
        run: |
          cat > /tmp/tokenplace-list-env-values.yaml <<'YAML'
          env:
            - name: FOO
              value: bar
          YAML

          helm template tokenplace charts/tokenplace \
            --namespace tokenplace \
            -f /tmp/tokenplace-list-env-values.yaml > /tmp/tokenplace-render-list-env.yaml

          python3 - <<'PY'
          import collections
          import yaml

          docs = list(yaml.safe_load_all(open("/tmp/tokenplace-render-list-env.yaml", encoding="utf-8")))
          deploy = next(d for d in docs if d and d.get("kind") == "Deployment")
          env = deploy["spec"]["template"]["spec"]["containers"][0]["env"]
          names = [item["name"] for item in env]
          dupes = [name for name, count in collections.Counter(names).items() if count > 1]
          assert not dupes, dupes
          values = {item["name"]: item.get("value") for item in env}
          assert values["FOO"] == "bar"
          assert values["RELAY_WORKERS"] == "1"
          assert int(values["RELAY_THREADS"]) > 1
          assert values["TOKENPLACE_RELAY_INTERNAL_URL"] == "http://127.0.0.1:$(RELAY_PORT)"
          assert "TOKENPLACE_API_V1_DISTRIBUTED_RELAY_URL" not in values
          assert "TOKENPLACE_DISTRIBUTED_COMPUTE_URL" not in values
          assert values["XDG_CONFIG_HOME"] == "/tmp/.config"
          assert values["XDG_DATA_HOME"] == "/tmp/.local/share"
          assert values["XDG_CACHE_HOME"] == "/tmp/.cache"
          assert values["XDG_STATE_HOME"] == "/tmp/.local/state"
          PY

      - name: Template extraEnv valueFrom render check
        run: |
          cat > /tmp/tokenplace-extra-env-values.yaml <<'YAML'
          extraEnv:
            - name: SECRET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: relay-secret
                  key: token
          YAML

          helm template tokenplace charts/tokenplace \
            --namespace tokenplace \
            -f /tmp/tokenplace-extra-env-values.yaml > /tmp/tokenplace-render-extra-env.yaml

          python3 - <<'PY'
          import yaml

          docs = list(yaml.safe_load_all(open("/tmp/tokenplace-render-extra-env.yaml", encoding="utf-8")))
          deploy = next(d for d in docs if d and d.get("kind") == "Deployment")
          env = deploy["spec"]["template"]["spec"]["containers"][0]["env"]
          secret = next(item for item in env if item["name"] == "SECRET_TOKEN")
          assert secret["valueFrom"]["secretKeyRef"]["name"] == "relay-secret"
          assert secret["valueFrom"]["secretKeyRef"]["key"] == "token"
          PY

      - name: Template strategy-empty fallback smoke render
        run: |

          helm template tokenplace charts/tokenplace \
            --namespace tokenplace \
            --set ingress.enabled=true \
            --set ingress.host=staging.token.place \
            --set image.tag=main-deadbee \
            --set-json strategy={} > /tmp/tokenplace-render-strategy-empty.yaml

          grep -n "type: Recreate" /tmp/tokenplace-render-strategy-empty.yaml
          ! grep -n "rollingUpdate:" /tmp/tokenplace-render-strategy-empty.yaml

          # Upgrade-path guard: template retains explicit stale-field clear branch
          # when switching live defaulted RollingUpdate Deployments to Recreate.
          grep -n 'else if and (eq $strategyType "Recreate") $existingHasRollingUpdate' charts/tokenplace/templates/deployment.yaml
          grep -n 'rollingUpdate: null' charts/tokenplace/templates/deployment.yaml

      - name: Capture chart metadata
        id: chart_meta
        run: |
          set -euo pipefail
          chart_name="$(helm show chart charts/tokenplace | awk -F': ' '/^name:/{print $2}')"
          chart_version="$(helm show chart charts/tokenplace | awk -F': ' '/^version:/{print $2}')"
          chart_ref="oci://ghcr.io/futuroptimist/charts/${chart_name}"
          test "${chart_name}" = "tokenplace"
          test "${chart_ref}" = "oci://ghcr.io/futuroptimist/charts/tokenplace"
          echo "chart_version=${chart_version}" >> "$GITHUB_OUTPUT"
          echo "chart_ref=${chart_ref}" >> "$GITHUB_OUTPUT"

      - name: Package chart
        id: package
        run: |
          set -euo pipefail
          mkdir -p dist
          helm package charts/tokenplace --destination dist
          package_file="$(find dist -maxdepth 1 -type f -name '*.tgz' | head -n 1)"
          test -n "${package_file}"
          test -f "${package_file}"
          echo "package_file=${package_file}" >> "$GITHUB_OUTPUT"

      - name: Upload chart package artifact
        uses: actions/upload-artifact@v4
        with:
          name: tokenplace-chart-package
          path: ${{ steps.package.outputs.package_file }}

      - name: Publish validation summary
        run: |
          {
            echo "## Helm chart validation"
            echo ""
            echo "Chart reference: \`${{ steps.chart_meta.outputs.chart_ref }}\`"
            echo "Chart version: \`${{ steps.chart_meta.outputs.chart_version }}\`"
            echo "Packaged artifact: \`${{ steps.package.outputs.package_file }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish chart to GHCR OCI
    runs-on: ubuntu-latest
    needs: validate-and-package
    if: github.event_name != 'pull_request' && github.repository == 'futuroptimist/token.place'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Decide whether to publish chart
        id: publish_decision
        env:
          CHART_REF: ${{ needs.validate-and-package.outputs.chart_ref }}
          CHART_VERSION: ${{ needs.validate-and-package.outputs.chart_version }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_SHA: ${{ github.sha }}
          MANUAL_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.publish || 'false' }}
        run: |
          set -euo pipefail

          chart_source_paths=(
            "charts/tokenplace/**"
          )
          chart_related_paths=(
            "${chart_source_paths[@]}"
            ".github/workflows/ci-helm.yml"
            "README.md"
            "docs/k3s-sugarkube-dev.md"
            "docs/k3s-sugarkube-prod.md"
            "docs/k3s-sugarkube-staging.md"
            "docs/ops/sugarkube-release.md"
            "docs/relay-deploy.md"
            "docs/relay_sugarkube_onboarding.md"
            "docs/RPI_DEPLOYMENT_GUIDE.md"
          )

          chart_exists=false
          chart_lookup_status=error
          chart_lookup_log="$(mktemp)"
          if helm show chart "${CHART_REF}" --version "${CHART_VERSION}" >"${chart_lookup_log}" 2>&1; then
            chart_exists=true
            chart_lookup_status=found
          elif grep -Eiq '(not found|404|manifest unknown|name unknown)' "${chart_lookup_log}"; then
            chart_exists=false
            chart_lookup_status=not_found
          else
            chart_lookup_status=error
          fi
          chart_lookup_details="$(tr '\n' ' ' <"${chart_lookup_log}" | sed -E 's/[[:space:]]+/ /g; s/^ //; s/ $//')"
          rm -f "${chart_lookup_log}"

          chart_source_changed=false
          chart_related_changed=false
          compare_note="not evaluated for ${EVENT_NAME}"
          if [[ "${EVENT_NAME}" == "push" ]]; then
            before="${EVENT_BEFORE}"
            after="${EVENT_SHA}"
            if [[ -n "${before}" && ! "${before}" =~ ^0+$ ]] && git cat-file -e "${before}^{commit}" 2>/dev/null; then
              compare_note="${before}..${after}"
              if git diff --quiet "${before}" "${after}" -- "${chart_source_paths[@]}"; then
                chart_source_changed=false
              else
                chart_source_changed=true
              fi
              if git diff --quiet "${before}" "${after}" -- "${chart_related_paths[@]}"; then
                chart_related_changed=false
              else
                chart_related_changed=true
              fi
            else
              compare_note="unable to compare full pushed range; treating chart paths as changed"
              chart_source_changed=true
              chart_related_changed=true
            fi
          elif [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            compare_note="manual dispatch publish=${MANUAL_PUBLISH}"
          fi

          action=skip
          reason="Publish skipped: ${EVENT_NAME} does not request chart publishing."
          if [[ "${chart_lookup_status}" == "error" ]]; then
            action=fail
            reason="Publish failed: could not determine whether chart version ${CHART_VERSION} exists in ${CHART_REF}; registry lookup must succeed or return a confirmed not-found response before publishing. ${chart_lookup_details}"
          elif [[ "${EVENT_NAME}" == "push" ]]; then
            if [[ "${chart_source_changed}" == "true" && "${chart_exists}" == "false" ]]; then
              action=publish
              reason="Publishing new chart version ${CHART_VERSION} to ${CHART_REF}."
            elif [[ "${chart_source_changed}" == "true" && "${chart_exists}" == "true" ]]; then
              action=fail
              reason="Publish failed: chart files changed but chart version ${CHART_VERSION} already exists; bump charts/tokenplace/Chart.yaml version."
            elif [[ "${chart_exists}" == "true" ]]; then
              reason="Publish skipped: chart version ${CHART_VERSION} already exists and no chart files changed."
            else
              reason="Publish skipped: chart files did not change and chart version ${CHART_VERSION} is not present; push a chart change or use manual publish to release this ref."
            fi
          elif [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ "${MANUAL_PUBLISH}" == "true" && "${chart_exists}" == "false" ]]; then
              action=publish
              reason="Publishing new chart version ${CHART_VERSION} to ${CHART_REF} from manual dispatch."
            elif [[ "${MANUAL_PUBLISH}" == "true" && "${chart_exists}" == "true" ]]; then
              reason="Publish skipped: manual publish requested but chart version ${CHART_VERSION} already exists; immutable OCI artifacts are never overwritten."
            elif [[ "${chart_exists}" == "true" ]]; then
              reason="Publish skipped: manual dispatch validate/package only; chart version ${CHART_VERSION} already exists."
            else
              reason="Publish skipped: manual dispatch validate/package only; set publish=true to publish new chart version ${CHART_VERSION}."
            fi
          fi

          echo "action=${action}" >> "$GITHUB_OUTPUT"
          echo "chart_exists=${chart_exists}" >> "$GITHUB_OUTPUT"
          echo "chart_lookup_status=${chart_lookup_status}" >> "$GITHUB_OUTPUT"
          echo "chart_changed=${chart_source_changed}" >> "$GITHUB_OUTPUT"
          echo "chart_related_changed=${chart_related_changed}" >> "$GITHUB_OUTPUT"
          echo "compare_note=${compare_note}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"

      - name: Download packaged chart artifact
        if: steps.publish_decision.outputs.action == 'publish'
        uses: actions/download-artifact@v4
        with:
          name: tokenplace-chart-package
          path: dist

      - name: Push chart to OCI registry
        id: push
        if: steps.publish_decision.outputs.action == 'publish'
        run: |
          set -euo pipefail
          package_file="$(find dist -maxdepth 1 -type f -name '*.tgz' | head -n 1)"
          test -n "${package_file}"
          test -f "${package_file}"
          chart_ref="${{ needs.validate-and-package.outputs.chart_ref }}"
          chart_registry="${chart_ref%/*}"
          helm push "${package_file}" "${chart_registry}"
          echo "chart_ref=${chart_ref}" >> "$GITHUB_OUTPUT"

      - name: Publish chart summary
        if: always()
        run: |
          {
            echo "## Helm chart publish decision"
            echo ""
            echo "Chart reference: \`${{ needs.validate-and-package.outputs.chart_ref }}\`"
            echo "Chart version: \`${{ needs.validate-and-package.outputs.chart_version }}\`"
            echo "Chart exists in GHCR: \`${{ steps.publish_decision.outputs.chart_exists }}\`"
            echo "Chart lookup status: \`${{ steps.publish_decision.outputs.chart_lookup_status }}\`"
            echo "Chart source files changed: \`${{ steps.publish_decision.outputs.chart_changed }}\`"
            echo "Chart-related files changed: \`${{ steps.publish_decision.outputs.chart_related_changed }}\`"
            echo "Comparison: \`${{ steps.publish_decision.outputs.compare_note }}\`"
            echo "Decision: \`${{ steps.publish_decision.outputs.action }}\`"
            echo ""
            echo "${{ steps.publish_decision.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when changed chart files need a new version
        if: steps.publish_decision.outputs.action == 'fail'
        run: |
          echo "${{ steps.publish_decision.outputs.reason }}" >&2
          exit 1
