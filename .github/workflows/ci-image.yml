name: Build and publish GHCR relay image

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build
        required: false
        default: main

jobs:
  build-and-smoke:
    name: Build and smoke-test relay image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      short_sha: ${{ steps.tags.outputs.short_sha }}
      created: ${{ steps.tags.outputs.created }}
      repository: ${{ steps.tags.outputs.repository }}
      publish_tags: ${{ steps.tags.outputs.publish_tags }}
      summary_tags: ${{ steps.tags.outputs.summary_tags }}
      semver_tag: ${{ steps.tags.outputs.semver_tag }}
      branch_tag: ${{ steps.tags.outputs.branch_tag }}
      latest_tag: ${{ steps.tags.outputs.latest_tag }}
      sha_tag: ${{ steps.tags.outputs.sha_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Compute image metadata and tags
        id: tags
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=7 HEAD)"
          created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          repository="ghcr.io/futuroptimist/tokenplace-relay"
          semver_tag=""

          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "created=${created}" >> "$GITHUB_OUTPUT"
          echo "repository=${repository}" >> "$GITHUB_OUTPUT"
          echo "branch_tag=${repository}:main-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${repository}:main-latest" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${repository}:sha-${short_sha}" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/tags/"* ]]; then
            semver_tag="${GITHUB_REF#refs/tags/}"
            if [[ ! "${semver_tag}" =~ ^v[0-9][0-9A-Za-z._-]*$ ]]; then
              echo "Invalid release tag '${semver_tag}' for Docker publish." >&2
              exit 1
            fi
            if [[ "${semver_tag}" == *"/"* || "${semver_tag}" == *":"* || "${semver_tag}" == *"@"* || "${semver_tag}" == "." || "${semver_tag}" == ".." ]]; then
              echo "Unsafe release tag '${semver_tag}' for Docker publish." >&2
              exit 1
            fi
            echo "semver_tag=${semver_tag}" >> "$GITHUB_OUTPUT"
            echo "publish_tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "${repository}:${semver_tag}" >> "$GITHUB_OUTPUT"
            echo "${repository}:sha-${short_sha}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "summary_tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "${repository}:${semver_tag}" >> "$GITHUB_OUTPUT"
            echo "${repository}:sha-${short_sha}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "publish_tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "${repository}:main-${short_sha}" >> "$GITHUB_OUTPUT"
            echo "${repository}:main-latest" >> "$GITHUB_OUTPUT"
            echo "${repository}:sha-${short_sha}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "summary_tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "${repository}:main-${short_sha} (immutable)" >> "$GITHUB_OUTPUT"
            echo "${repository}:main-latest (mutable convenience)" >> "$GITHUB_OUTPUT"
            echo "${repository}:sha-${short_sha}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "publish_tags=" >> "$GITHUB_OUTPUT"
            echo "summary_tags=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build relay image locally for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          provenance: false
          tags: tokenplace-relay:smoke
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.tags.outputs.short_sha }}
            org.opencontainers.image.created=${{ steps.tags.outputs.created }}
          cache-from: type=gha,scope=relay-image
          cache-to: type=gha,mode=max,scope=relay-image

      - name: Smoke test relay container
        run: |
          set -euo pipefail

          docker run -d --rm --name tokenplace-relay-smoke \
            -p 127.0.0.1:5010:5010 \
            -e TOKENPLACE_RELAY_REQUIRE_UPSTREAM_HEALTH=0 \
            tokenplace-relay:smoke

          cleanup() {
            echo "--- container logs ---"
            docker logs tokenplace-relay-smoke || true
            docker stop tokenplace-relay-smoke >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5010/livez \
              && curl -fsS http://127.0.0.1:5010/healthz \
              && curl -fsS http://127.0.0.1:5010/ >/dev/null \
              && curl -fsS http://127.0.0.1:5010/metrics >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:5010/livez >/dev/null
          curl -fsS http://127.0.0.1:5010/healthz >/dev/null
          curl -fsS http://127.0.0.1:5010/ >/dev/null
          curl -fsS http://127.0.0.1:5010/metrics >/dev/null

          docker exec tokenplace-relay-smoke sh -c "tr '\\0' ' ' < /proc/1/cmdline" | grep -F -- '--workers 1'

  publish:
    name: Publish relay image
    runs-on: ubuntu-latest
    needs: build-and-smoke
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/main') || github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (arm64 for push)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ needs.build-and-smoke.outputs.publish_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.build-and-smoke.outputs.short_sha }}
            org.opencontainers.image.created=${{ needs.build-and-smoke.outputs.created }}
          cache-from: type=gha,scope=relay-image
          cache-to: type=gha,mode=max,scope=relay-image

      - name: Publish workflow summary
        run: |
          {
            echo "## Relay image tags"
            echo ""
            if [[ -n "${{ needs.build-and-smoke.outputs.semver_tag }}" ]]; then
              echo "Publish reason: Git tag \`${{ needs.build-and-smoke.outputs.semver_tag }}\`"
            else
              echo "Publish reason: main branch push"
            fi
            echo "Published tags:"
            while IFS= read -r tag; do
              [[ -z "${tag}" ]] && continue
              echo "- \`${tag}\`"
            done <<< "${{ needs.build-and-smoke.outputs.summary_tags }}"
            echo ""
            echo "Pushed: true"
          } >> "$GITHUB_STEP_SUMMARY"
